<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐈🦉 CAT & OWL QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1628;
  --panel: #141c2e;
  --panel2: #1a2438;
  --border: #2a3a5a;
  --teal: #00d4aa;
  --teal2: #00a888;
  --gold: #f0c040;
  --gold2: #c8a030;
  --red: #ff4455;
  --blue: #4488ff;
  --green: #44cc88;
  --purple: #aa66ff;
  --white: #e8eef8;
  --muted: #6888aa;
  --hp-green: #44dd88;
  --hp-yellow: #ffcc00;
  --hp-red: #ff4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DotGothic16', 'Noto Sans JP', monospace;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── 星空背景 ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 10%, rgba(0,212,170,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 80% 15%, rgba(240,192,64,0.3) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── ゲームウィンドウ ── */
#game-window {
  position: relative;
  z-index: 1;
  width: 680px;
  max-width: 98vw;
  border: 3px solid var(--border);
  border-radius: 4px;
  box-shadow:
    0 0 40px rgba(0,212,170,0.15),
    inset 0 0 80px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* ── タイトルバー ── */
#title-bar {
  background: var(--panel);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--border);
}

#title-bar span {
  font-size: 13px;
  color: var(--teal);
  letter-spacing: 0.15em;
}

#title-bar .ver {
  font-size: 10px;
  color: var(--muted);
}

/* ── メインビュー ── */
#main-view {
  background: var(--bg2);
  min-height: 260px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── マップ ── */
#map-container {
  width: 100%;
  height: 260px;
  position: relative;
  display: none;
}

.map-cell {
  position: absolute;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  border-radius: 4px;
}

.map-cell:hover { border-color: var(--teal); background: rgba(0,212,170,0.1); }
.map-cell.current { background: rgba(0,212,170,0.2); border-color: var(--teal); animation: cellPulse 1.5s infinite; }
.map-cell.visited { opacity: 0.5; }
.map-cell.blocked { cursor: not-allowed; opacity: 0.3; }

@keyframes cellPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.4); }
  50%      { box-shadow: 0 0 0 6px rgba(0,212,170,0); }
}

/* ── キャラクタースプライト ── */
.sprite {
  font-size: 32px;
  line-height: 1;
  display: block;
  text-align: center;
}

/* ── バトル画面 ── */
#battle-view {
  width: 100%;
  padding: 20px;
  display: none;
  flex-direction: column;
  gap: 16px;
}

.battle-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 220px;
  padding: 10px 20px 0;
  position: relative;
  background: linear-gradient(180deg, #0a0e1a 0%, #0d1525 60%, #111e30 100%);
  overflow: hidden;
}

/* 床の光 */
.battle-stage::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 40px;
  background: radial-gradient(ellipse, rgba(255,68,85,0.18) 0%, transparent 70%);
  border-radius: 50%;
}

/* 背景グリッド */
.battle-stage::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(42,58,90,0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(42,58,90,0.3) 1px, transparent 1px);
  background-size: 40px 40px;
  perspective: 200px;
}

.enemy-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.enemy-sprite {
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: enemyFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 24px rgba(255,68,85,0.5));
  position: relative;
  overflow: visible;
}

.enemy-sprite svg {
  width: 140px !important;
  height: 140px !important;
  display: block;
  overflow: visible;
}

@keyframes enemyFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-8px) scale(1.03); }
}

.enemy-name {
  font-size: 13px;
  color: var(--red);
  letter-spacing: 0.12em;
  background: rgba(255,68,85,0.12);
  padding: 4px 14px;
  border-radius: 2px;
  border: 1px solid rgba(255,68,85,0.35);
  font-family: 'DotGothic16', monospace;
}

.player-area { display: none; }
.player-name { display: none; }

/* プレイヤーはHPバーのみで表現 */

/* ── HPバー ── */
.hp-section { padding: 0 10px; }

.hp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.hp-label {
  font-size: 11px;
  color: var(--muted);
  width: 80px;
  flex-shrink: 0;
}

.hp-bar-wrap {
  flex: 1;
  height: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.hp-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease, background 0.4s;
}

.hp-num {
  font-size: 11px;
  color: var(--white);
  width: 60px;
  text-align: right;
  flex-shrink: 0;
}

/* ── ステータスパネル ── */
#status-panel {
  background: var(--panel);
  border-top: 2px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 20px;
  font-size: 12px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
}

.stat-item span { color: var(--gold); }

/* ── メッセージウィンドウ ── */
#message-window {
  background: var(--panel);
  border-top: 2px solid var(--border);
  padding: 14px 18px;
  min-height: 80px;
  position: relative;
}

#message-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--white);
  min-height: 48px;
}

#message-cursor {
  display: inline-block;
  width: 10px;
  height: 14px;
  background: var(--white);
  margin-left: 2px;
  animation: blink 0.8s infinite;
  vertical-align: middle;
}

@keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }

/* ── コマンドウィンドウ ── */
#command-window {
  background: var(--panel2);
  border-top: 2px solid var(--border);
  padding: 12px 16px;
  display: none;
}

.cmd-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cmd-btn {
  padding: 10px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--white);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cmd-btn:hover:not(:disabled) {
  background: rgba(0,212,170,0.15);
  border-color: var(--teal);
  color: var(--teal);
  transform: translateX(2px);
}

.cmd-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.cmd-btn.correct {
  background: rgba(68,204,136,0.2);
  border-color: var(--green);
  color: var(--green);
}

.cmd-btn.wrong {
  background: rgba(255,68,85,0.2);
  border-color: var(--red);
  color: var(--red);
  animation: shake 0.3s;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-4px); }
  75%      { transform: translateX(4px); }
}

.cmd-btn.choice {
  grid-column: span 2;
  padding: 12px 16px;
  font-size: 13px;
}

/* ── クエスト選択 ── */
.quest-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
}

.quest-card:hover {
  border-color: var(--teal);
  background: rgba(0,212,170,0.08);
  transform: translateX(4px);
}

.quest-card h3 {
  font-size: 14px;
  color: var(--teal);
  margin-bottom: 6px;
}

.quest-card p {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

.quest-difficulty {
  display: inline-block;
  margin-top: 6px;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
}

.diff-1 { background: rgba(68,204,136,0.2); color: var(--green); }
.diff-2 { background: rgba(240,192,64,0.2); color: var(--gold); }
.diff-3 { background: rgba(255,68,85,0.2); color: var(--red); }

/* ── タイトル画面 ── */
#title-screen {
  text-align: center;
  padding: 40px 20px;
}

#title-screen h1 {
  font-size: 28px;
  color: var(--teal);
  letter-spacing: 0.2em;
  text-shadow: 0 0 20px rgba(0,212,170,0.5);
  margin-bottom: 8px;
  animation: titleGlow 2s ease-in-out infinite;
}

@keyframes titleGlow {
  0%,100% { text-shadow: 0 0 20px rgba(0,212,170,0.5); }
  50%      { text-shadow: 0 0 40px rgba(0,212,170,0.9), 0 0 80px rgba(0,212,170,0.3); }
}

#title-screen h2 {
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 30px;
}

.title-logo {
  font-size: 64px;
  margin-bottom: 16px;
  display: block;
  animation: logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.start-btn {
  display: inline-block;
  padding: 12px 40px;
  background: var(--teal2);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: all 0.2s;
  animation: startPulse 2s infinite;
}

.start-btn:hover {
  background: var(--teal);
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,212,170,0.4);
}

@keyframes startPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(0,212,170,0); }
}

/* ── ダメージエフェクト ── */
.damage-text {
  position: absolute;
  font-size: 22px;
  font-weight: 700;
  color: var(--red);
  text-shadow: 0 0 10px var(--red);
  animation: damageFloat 1s ease-out forwards;
  pointer-events: none;
  z-index: 100;
}

.heal-text {
  color: var(--green);
  text-shadow: 0 0 10px var(--green);
}

.player-damage-text {
  color: var(--gold);
  text-shadow: 0 0 10px var(--gold);
}

@keyframes damageFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
}

/* ── フラッシュエフェクト ── */
.flash-red { animation: flashRed 0.3s; }
.flash-green { animation: flashGreen 0.3s; }

@keyframes flashRed {
  0%,100% { background: var(--bg2); }
  50%      { background: rgba(255,68,85,0.2); }
}

@keyframes flashGreen {
  0%,100% { background: var(--bg2); }
  50%      { background: rgba(68,204,136,0.2); }
}

/* ── NPC会話 ── */
.npc-portrait {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 10px;
  background: rgba(0,212,170,0.05);
  border-radius: 6px;
  border: 1px solid rgba(0,212,170,0.15);
  margin-bottom: 10px;
}

.npc-face {
  font-size: 36px;
  flex-shrink: 0;
  background: var(--panel2);
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.npc-info { flex: 1; }
.npc-name { font-size: 12px; color: var(--teal); margin-bottom: 4px; font-weight: 700; }
.npc-text { font-size: 13px; color: var(--white); line-height: 1.7; }

/* ── 結果画面 ── */
#result-screen {
  text-align: center;
  padding: 30px 20px;
  display: none;
}

.result-icon { font-size: 60px; margin-bottom: 12px; }
.result-title { font-size: 22px; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.15em; }
.result-text { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
.score-box {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  margin: 0 auto 20px;
  max-width: 320px;
}
.score-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.score-row:last-child { border: none; font-weight: 700; color: var(--gold); }
.score-row span { color: var(--teal); }

/* ── スクロールバー ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── レスポンシブ ── */
@media (max-width: 700px) {
  #game-window { width: 100%; border-radius: 0; }
  .battle-stage { height: 180px; }
  .enemy-sprite { width: 120px; height: 120px; }
}
</style>
</head>
<body>

<div id="game-window">

  <!-- タイトルバー -->
  <div id="title-bar">
    <span>🐈🦉 CAT &amp; OWL QUEST</span>
    <span class="ver">ver 1.0 · 岩手県高度救命救急センター</span>
  </div>

  <!-- メインビュー -->
  <div id="main-view">
    <!-- タイトル画面 -->
    <div id="title-screen">
      <span class="title-logo">🐈🦉</span>
      <h1>CAT &amp; OWL QUEST</h1>
      <h2>〜 救命救急センターの戦士たち 〜</h2>
      <button class="start-btn" onclick="startGame()">は　じ　め　る</button>
    </div>

    <!-- マップ -->
    <div id="map-container"></div>

    <!-- バトル -->
    <div id="battle-view">
      <div class="battle-stage" id="battle-stage">
        <div class="enemy-area">
          <div class="enemy-sprite" id="enemy-sprite">
            <canvas id="enemy-canvas" width="140" height="140" style="display:block;"></canvas>
          </div>
          <div class="enemy-name" id="enemy-name">???</div>
        </div>
      </div>
      <div class="hp-section" style="padding:8px 14px;">
        <div class="hp-row">
          <div class="hp-label" id="enemy-hp-label" style="color:var(--red);">敵 HP</div>
          <div class="hp-bar-wrap"><div class="hp-bar" id="enemy-hp-bar" style="width:100%;background:var(--hp-green);"></div></div>
          <div class="hp-num" id="enemy-hp-num">100/100</div>
        </div>
        <div class="hp-row">
          <div class="hp-label" style="color:var(--teal);">🧑‍⚕️ 研修医</div>
          <div class="hp-bar-wrap"><div class="hp-bar" id="player-hp-bar" style="width:100%;background:var(--hp-green);"></div></div>
          <div class="hp-num" id="player-hp-num">100/100</div>
        </div>
      </div>
    </div>

    <!-- 結果 -->
    <div id="result-screen">
      <div class="result-icon" id="result-icon">🏆</div>
      <div class="result-title" id="result-title">クリア！</div>
      <div class="result-text" id="result-text"></div>
      <div class="score-box" id="score-box"></div>
      <button class="start-btn" onclick="resetGame()">も　う　一　度</button>
    </div>
  </div>

  <!-- ステータス -->
  <div id="status-panel">
    <div class="stat-item">👤 レベル <span id="stat-lv">1</span></div>
    <div class="stat-item">❤️ HP <span id="stat-hp">100/100</span></div>
    <div class="stat-item">⚔️ 攻撃力 <span id="stat-atk">20</span></div>
    <div class="stat-item">✅ 正解 <span id="stat-correct">0</span></div>
    <div class="stat-item">🏅 スコア <span id="stat-score">0</span></div>
  </div>

  <!-- メッセージ -->
  <div id="message-window">
    <div id="message-text"></div>
  </div>

  <!-- コマンド -->
  <div id="command-window">
    <div class="cmd-grid" id="cmd-grid"></div>
  </div>

</div>

<script>

// ══════════════════════════════════════════
// 敵SVGキャラクター定義
// ══════════════════════════════════════════

const ENEMY_SVGS = {

    ctx.moveTo(100,72); ctx.quadraticCurveTo(118,68,126,80);
    ctx.quadraticCurveTo(130,92,122,100); ctx.quadraticCurveTo(114,108,102,100);
    ctx.quadraticCurveTo(108,88,100,85); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#8800ff'; ctx.lineWidth=3; ctx.lineCap='round';
    [[126,99,132,108,130,118],[122,103,126,114,124,122],[118,105,120,116,116,124]].forEach(([x1,y1,cx,cy,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cx,cy,x2,y2); ctx.stroke();
    });
    // オーラ
    ctx.beginPath(); ctx.arc(70,40,32,0,Math.PI*2);
    ctx.strokeStyle='rgba(136,0,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(70,40,38,0,Math.PI*2);
    ctx.strokeStyle='rgba(136,0,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
    // 魔法陣
    ctx.beginPath(); ctx.arc(70,70,44,0,Math.PI*2);
    ctx.strokeStyle='rgba(170,0,255,0.2)'; ctx.lineWidth=0.5;
    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
  }
}

// ══════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════

function el(id) { return document.getElementById(id); }

function showSection(name) {
  el('title-screen').style.display = 'none';
  el('map-container').style.display = 'none';
  el('battle-view').style.display = 'none';
  el('result-screen').style.display = 'none';
  if (name === 'title') el('title-screen').style.display = 'block';
  if (name === 'map')   el('map-container').style.display = 'block';
  if (name === 'battle') { el('battle-view').style.display = 'flex'; }
  if (name === 'result') el('result-screen').style.display = 'block';
}

function setMsg(text) {
  el('message-text').innerHTML = text + '<span id="message-cursor"></span>';
}

function showCmds(btns) {
  const cw = el('command-window');
  const grid = el('cmd-grid');
  grid.innerHTML = '';
  cw.style.display = 'block';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'cmd-btn' + (b.full ? ' choice' : '');
    btn.innerHTML = (b.icon||'') + ' ' + b.label;
    btn.disabled = !!b.disabled;
    btn.onclick = b.action;
    grid.appendChild(btn);
  });
}

function hideCmds() { el('command-window').style.display = 'none'; }

function updateStatus() {
  const p = G.player;
  el('stat-lv').textContent = p.lv;
  el('stat-hp').textContent = p.hp + '/' + p.maxHp;
  el('stat-atk').textContent = p.atk;
  el('stat-correct').textContent = G.stats.correct;
  el('stat-score').textContent = p.score;
}

function updateHpBar(id, cur, max) {
  const pct = Math.max(0, cur/max*100);
  const bar = el(id);
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? 'var(--hp-green)' : pct > 25 ? 'var(--hp-yellow)' : 'var(--hp-red)';
}

function spawnDamage(x, y, text, cls='damage-text') {
  const stage = el('battle-stage');
  if (!stage) return;
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  d.style.left = x + 'px';
  d.style.top = y + 'px';
  d.style.position = 'absolute';
  stage.appendChild(d);
  setTimeout(() => { if(d.parentNode) d.remove(); }, 1000);
}

function startGame() {
  G.player = JSON.parse(JSON.stringify(GAME_DATA.player));
  G.currentCell = 'start';
  G.visitedCells = new Set(['start']);
  G.stats = { correct:0, wrong:0, totalDmg:0 };
  buildMap();
  showSection('map');
  G.phase = 'map';
  setMsg('🏥 岩手県高度救命救急センターに到着した！\n東へ進み、感染症の魔物を倒すのだ。');
  showMapCmds();
  updateStatus();
}

function resetGame() {
  G = {
    phase:'title', player:null, currentCell:'start',
    visitedCells:new Set(['start']),
    currentEnemy:null, currentQ:0,
    msgQueue:[], msgTimer:null,
    battleMode:'command',
    stats:{correct:0,wrong:0,totalDmg:0},

  setMsg('');
  hideCmds();
}

// ══════════════════════════════════════════
// マップ
// ══════════════════════════════════════════

function buildMap() {
  const mc = el('map-container');
  mc.innerHTML = '';
  const offsetX = 20, offsetY = 110;
  const cellW = 76;

  GAME_DATA.map.forEach((cell, i) => {
    const div = document.createElement('div');
    div.className = 'map-cell';
    div.id = 'cell-' + cell.id;
    div.style.left = (offsetX + cell.x * cellW) + 'px';
    div.style.top = offsetY + 'px';
    div.title = cell.label;

    // 矢印
    if (i < GAME_DATA.map.length - 1) {
      const arrow = document.createElement('div');
      arrow.style.cssText = `position:absolute;left:${(offsetX + cell.x * cellW + 42)}px;top:${offsetY+10}px;font-size:18px;color:var(--border);pointer-events:none;`;
      arrow.textContent = '→';
      mc.appendChild(arrow);
    }

    const isVisited = G.visitedCells.has(cell.id);
    const isCurrent = G.currentCell === cell.id;
    const isAccessible = isNextCell(cell.id);

    if (isCurrent) div.classList.add('current');
    if (isVisited && !isCurrent) div.classList.add('visited');
    if (!isAccessible && !isVisited) div.classList.add('blocked');

    // 敵はクリア済みなら☑
    let icon = cell.icon;
    if ((cell.type === 'battle' || cell.type === 'boss') && isVisited) icon = '✅';

    div.innerHTML = `<span style="font-size:28px;">${icon}</span>`;

    if (isAccessible || isCurrent) {
      div.onclick = () => moveToCell(cell.id);
    }
    mc.appendChild(div);
  });

  // ラベル
  GAME_DATA.map.forEach(cell => {
    const lbl = document.createElement('div');
    lbl.style.cssText = `position:absolute;left:${(offsetX + cell.x * cellW - 10)}px;top:${offsetY+44}px;font-size:10px;color:var(--muted);white-space:nowrap;width:60px;text-align:center;`;
    lbl.textContent = cell.label;
    mc.appendChild(lbl);
  });
}

function isNextCell(id) {
  const cells = GAME_DATA.map;
  const curIdx = cells.findIndex(c => c.id === G.currentCell);
  const tgtIdx = cells.findIndex(c => c.id === id);
  return tgtIdx === curIdx + 1;
}

function showMapCmds() {
  const cells = GAME_DATA.map;
  const curIdx = cells.findIndex(c => c.id === G.currentCell);
  const nextCell = cells[curIdx + 1];
  const btns = [];
  if (nextCell) {
    btns.push({ icon:'→', label:'東へ進む（' + nextCell.label + '）', full:true, action:()=>moveToCell(nextCell.id) });
  }
  btns.push({ icon:'📖', label:'現在地を確認', action:checkPosition });
  showCmds(btns);
}

function checkPosition() {
  const cell = GAME_DATA.map.find(c => c.id === G.currentCell);
  setMsg(`📍 現在地：${cell.label}\n進捗：${G.visitedCells.size}/${GAME_DATA.map.length} エリア踏破\n✅ 正解数：${G.stats.correct}問 / スコア：${G.player.score}点`);
}

function moveToCell(id) {
  G.currentCell = id;
  G.visitedCells.add(id);
  buildMap();

  const cell = GAME_DATA.map.find(c => c.id === id);

  if (cell.type === 'start') {
    setMsg('🏥 救命救急センター。旅の起点だ。');
    showMapCmds();
  } else if (cell.type === 'npc') {
    startNpc(cell.npc);
  } else if (cell.type === 'battle') {
    startBattle(cell.enemyId);
  } else if (cell.type === 'boss') {
    setMsg('👹 ！！！　最終ボスが現れた！！！\n「我は多臓器不全の魔王…。貴様の知識で倒してみよ！」');
    setTimeout(() => startBattle(cell.enemyId), 1800);
    hideCmds();
  }
}

// ══════════════════════════════════════════
// NPC会話
// ══════════════════════════════════════════

function startNpc(npcId) {
  G.phase = 'npc';
  const npc = GAME_DATA.npcs[npcId];
  let lineIdx = 0;
  hideCmds();

  function showLine() {
    const line = npc.lines[lineIdx];
    const html = `<div class="npc-portrait">
      <div class="npc-face">${npc.face}</div>
      <div class="npc-info">
        <div class="npc-name">${npc.name}</div>
        <div class="npc-text">${line}</div>
      </div>
    </div>`;
    setMsg(html);
    lineIdx++;

    if (lineIdx < npc.lines.length) {
      showCmds([{ icon:'▶', label:'次へ', full:true, action:showLine }]);
    } else {
      showCmds([{ icon:'✅', label:'ありがとう、先に進む', full:true, action:endNpc }]);
    }
  }

  showLine();
}

function endNpc() {
  G.phase = 'map';
  setMsg('先に進む準備ができた。');
  showMapCmds();
}

// ══════════════════════════════════════════
// バトル
// ══════════════════════════════════════════

function startBattle(enemyId) {
  const eData = JSON.parse(JSON.stringify(GAME_DATA.enemies[enemyId]));
  G.currentEnemy = eData;
  G.currentQ = 0;
  G.phase = 'battle';
  G.battleMode = 'command';

  showSection('battle');
  // canvasが確実にDOMに表示された後に描画する（150ms待機）
  setTimeout(() => { setEnemySprite(enemyId); }, 150);
  el('enemy-name').textContent = eData.name;
  el('enemy-hp-label').textContent = eData.name.substring(0,6) + ' HP';
  updateHpBar('enemy-hp-bar', eData.hp, eData.maxHp);
  updateHpBar('player-hp-bar', G.player.hp, G.player.maxHp);
  el('enemy-hp-num').textContent = eData.hp + '/' + eData.maxHp;
  el('player-hp-num').textContent = G.player.hp + '/' + G.player.maxHp;

  setMsg(`⚔️ ${eData.name} が現れた！\nHP: ${eData.hp}  攻撃力: ${eData.atk}`);

  setTimeout(() => {
    showBattleCommand();
  }, 1200);
}

function showBattleCommand() {
  if (G.phase !== 'battle') return;
  G.battleMode = 'command';
  showCmds([
    { icon:'🩺', label:'診断・治療（問題に答えて攻撃）', action:startQuestion },
    { icon:'💊', label:'アイテムを使う（HP+20回復）', action:useItem },
    { icon:'📖', label:'敵の情報を見る', action:checkEnemy },
  ]);
  setMsg('どうする？');
}

function checkEnemy() {
  const e = G.currentEnemy;
  setMsg(`📋 ${e.name}\nHP: ${e.hp}/${e.maxHp}\n攻撃力: ${e.atk}\n残り問題数: ${e.questions.length - G.currentQ}問`);
  setTimeout(showBattleCommand, 1500);
}

function useItem() {
  const heal = 20;
  G.player.hp = Math.min(G.player.hp + heal, G.player.maxHp);
  updateHpBar('player-hp-bar', G.player.hp, G.player.maxHp);
  el('player-hp-num').textContent = G.player.hp + '/' + G.player.maxHp;
  spawnDamage(480, 80, '+'+heal+' HP', 'damage-text heal-text');
  updateStatus();
  setMsg(`💊 アイテムを使った！ HP +${heal}回復！`);
  el('main-view').classList.add('flash-green');
  setTimeout(() => el('main-view').classList.remove('flash-green'), 300);
  setTimeout(() => enemyAttack(() => {
    if (G.player.hp > 0) showBattleCommand();
  }), 1200);
}

function startQuestion() {
  if (G.phase !== 'battle') return;
  if (!G.currentEnemy) { showBattleCommand(); return; }
  if (G.currentQ >= G.currentEnemy.questions.length) {
    setMsg('すでにすべての問題に答えた！力を振り絞って攻撃！');
    setTimeout(() => { playerAttack(30); }, 800);
    return;
  }

  G.battleMode = 'question';
  const q = G.currentEnemy.questions[G.currentQ];
  setMsg(`🩺 【診断クイズ】\n${q.q}`);

  const btns = q.choices.map((c, i) => ({
    icon: ['Ａ','Ｂ','Ｃ','Ｄ'][i],
    label: c.text,
    full: true,
    action: () => answerQuestion(i)
  }));
  showCmds(btns);
}

function answerQuestion(idx) {
  if (G.phase !== 'battle' || G.battleMode !== 'question') return;
  const q = G.currentEnemy.questions[G.currentQ];
  if (!q) { showBattleCommand(); return; }
  const chosen = q.choices[idx];
  const allBtns = el('cmd-grid').querySelectorAll('.cmd-btn');
  allBtns.forEach(b => b.disabled = true);

  if (chosen.correct) {
    // 正解
    allBtns[idx].classList.add('correct');
    G.stats.correct++;
    G.player.score += 100 + G.player.lv * 10;
    G.currentQ++;
    updateStatus();

    setMsg(`✅ 正解！\n📖 ${q.explanation}`);
    el('main-view').classList.add('flash-green');
    setTimeout(() => el('main-view').classList.remove('flash-green'), 300);

    setTimeout(() => {
      playerAttack(q.damage);
    }, 1800);
  } else {
    // 不正解
    allBtns[idx].classList.add('wrong');
    G.stats.wrong++;

    // 正解を光らせる
    q.choices.forEach((c, i) => {
      if (c.correct) allBtns[i].classList.add('correct');
    });

    setMsg(`❌ 不正解…\n📖 ${q.explanation}`);
    el('main-view').classList.add('flash-red');
    setTimeout(() => el('main-view').classList.remove('flash-red'), 300);

    setTimeout(() => {
      enemyAttack(() => {
        if (G.player.hp > 0) showBattleCommand();
      });
    }, 1800);
  }
}

function playerAttack(dmg) {
  const e = G.currentEnemy;
  e.hp = Math.max(0, e.hp - dmg);
  updateHpBar('enemy-hp-bar', e.hp, e.maxHp);
  el('enemy-hp-num').textContent = e.hp + '/' + e.maxHp;
  spawnDamage(80, 40, '-' + dmg);
  const es = el('enemy-sprite');
  if(es){ es.style.animation = 'none'; setTimeout(() => { if(el('enemy-sprite')) el('enemy-sprite').style.animation = ''; }, 300); }

  if (e.hp <= 0) {
    setTimeout(battleVictory, 800);
  } else {
    setMsg(`⚔️ ${dmg}のダメージを与えた！\n敵残りHP: ${e.hp}`);
    setTimeout(() => {
      enemyAttack(() => {
        if (G.player.hp > 0) showBattleCommand();
      });
    }, 1200);
  }
}

function enemyAttack(callback) {
  const e = G.currentEnemy;
  const dmg = Math.floor(e.atk * (0.8 + Math.random() * 0.4));
  G.player.hp = Math.max(0, G.player.hp - dmg);
  G.stats.totalDmg += dmg;
  updateHpBar('player-hp-bar', G.player.hp, G.player.maxHp);
  el('player-hp-num').textContent = G.player.hp + '/' + G.player.maxHp;
  spawnDamage(480, 80, '-' + dmg, 'damage-text player-damage-text');
  const ps = el('player-sprite');
  if(ps){ ps.style.filter = 'brightness(2) hue-rotate(180deg)'; setTimeout(() => { if(el('player-sprite')) el('player-sprite').style.filter = ''; }, 300); }
  updateStatus();

  setMsg(`💥 ${e.name}の攻撃！ ${dmg}のダメージを受けた！\nあなたのHP: ${G.player.hp}/${G.player.maxHp}`);

  if (G.player.hp <= 0) {
    setTimeout(battleDefeat, 1000);
  } else {
    setTimeout(callback, 1200);
  }
}

function battleVictory() {
  const e = G.currentEnemy;
  // 撃破時はcanvasをクリアするだけ（opacity変更しない）
  const defeatCanvas = el('enemy-canvas');
  if(defeatCanvas){
    const dCtx = defeatCanvas.getContext('2d');
    if(dCtx){
      // ✕マークを描画して撃破を表現
      dCtx.clearRect(0,0,140,140);
      dCtx.strokeStyle = '#ff4455';
      dCtx.lineWidth = 8;
      dCtx.lineCap = 'round';
      dCtx.beginPath(); dCtx.moveTo(40,40); dCtx.lineTo(100,100); dCtx.stroke();
      dCtx.beginPath(); dCtx.moveTo(100,40); dCtx.lineTo(40,100); dCtx.stroke();
    }
  }
  G.player.exp += e.reward.exp;
  G.player.score += e.reward.score;

  // レベルアップ判定
  if (G.player.exp >= G.player.lv * 50) {
    G.player.lv++;
    G.player.maxHp += 20;
    G.player.hp = G.player.maxHp;
    G.player.atk += 5;
    setMsg(`🎉 ${e.name}を倒した！\n✨ レベルアップ！ Lv.${G.player.lv}\n最大HP+20 攻撃力+5`);
  } else {
    setMsg(`🎉 ${e.name}を倒した！\n経験値+${e.reward.exp} スコア+${e.reward.score}`);
  }

  updateStatus();

  setTimeout(() => {
    showSection('map');
    G.phase = 'map';
    buildMap();

    // ボス撃破なら終了
    const cell = GAME_DATA.map.find(c => c.id === G.currentCell);
    if (cell && cell.type === 'boss') {
      setTimeout(showEnding, 1200);
    } else {
      setMsg('敵を倒した！先へ進もう。');
      showMapCmds();
    }
  }, 2000);
}

function battleDefeat() {
  hideCmds();
  setMsg('😵 力尽きた…\nしかし、知識は残る。もう一度挑戦しろ！');
  G.phase = 'result';
  setTimeout(() => showResult(false), 2000);
}

// ══════════════════════════════════════════
// エンディング・結果
// ══════════════════════════════════════════

function showEnding() {
  setMsg('🏆 魔王を倒した！\n救命救急センターに平和が戻った…\n「猫と梟の知識が世界を救った！」');
  hideCmds();
  setTimeout(() => showResult(true), 3000);
}

function showResult(cleared) {
  showSection('result');
  G.phase = 'result';

  if (cleared) {
    el('result-icon').textContent = '🏆';
    el('result-title').textContent = 'ゲームクリア！';
    el('result-text').textContent = '救命救急センターの平和を守った。\n敗血症・感染症の知識を存分に発揮した証だ。\nこの知識を実臨床でも活かせ！';
  } else {
    el('result-icon').textContent = '💀';
    el('result-title').textContent = 'ゲームオーバー';
    el('result-text').textContent = '倒れてしまった…しかし知識は残る。\nもう一度挑戦して、正しい答えを覚えよう。';
  }

  const accuracy = G.stats.correct + G.stats.wrong > 0
    ? Math.round(G.stats.correct / (G.stats.correct + G.stats.wrong) * 100)
    : 0;

  el('score-box').innerHTML = `
    <div class="score-row">最終スコア <span>${G.player.score}点</span></div>
    <div class="score-row">到達レベル <span>Lv.${G.player.lv}</span></div>
    <div class="score-row">正解数 <span>${G.stats.correct}問</span></div>
    <div class="score-row">不正解数 <span>${G.stats.wrong}問</span></div>
    <div class="score-row">正答率 <span>${accuracy}%</span></div>
  `;

  hideCmds();
  setMsg(cleared ? '🐈🦉 猫と梟の精鋭よ、お疲れ様！' : '次こそ打ち勝て！知識が最大の武器だ。');
}

// ══════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════

showSection('title');
setMsg('🐈🦉 CAT & OWL QUEST へようこそ。\n岩手県高度救命救急センターを舞台にした医療RPGだ。\n敗血症・感染症の知識で魔物を倒せ！');
hideCmds();
</script>
