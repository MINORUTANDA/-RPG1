<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まりりん先生に会いたい ～救命救急の恋～</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;overflow-x:hidden;}

/* ===== VNシーン ===== */
#vn-screen{
  display:none;position:fixed;inset:0;background:#0a0a1a;z-index:100;
  flex-direction:column;cursor:pointer;
}
.vn-bg{
  position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;
  background:#0f0f1f;
}
.vn-char{
  height:82%;max-height:500px;object-fit:contain;position:relative;z-index:1;
  transition:opacity 0.35s;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.8));
}
.vn-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 0.7s;z-index:2;pointer-events:none;}
.vn-textbox{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(0deg,rgba(5,10,30,0.97) 0%,rgba(5,10,30,0.92) 75%,transparent 100%);
  padding:18px 28px 26px;min-height:140px;
  border-top:1px solid rgba(100,150,255,0.15);
}
.vn-speaker{font-size:12px;color:#8aafd4;letter-spacing:2px;margin-bottom:7px;min-height:16px;}
.vn-text{font-size:15px;line-height:1.95;color:#e8eeff;min-height:56px;}
.vn-hint{font-size:10px;color:#3a4560;text-align:right;margin-top:6px;}

/* ===== 暗転 ===== */
#blackout-screen{
  display:none;position:fixed;inset:0;background:#000;z-index:200;
  flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
}
.heartbeat{font-size:30px;color:rgba(220,80,100,0.9);letter-spacing:10px;margin:16px 0;opacity:0;transition:opacity 0.5s;}
.blackout-text{font-size:17px;color:rgba(255,255,255,0.85);letter-spacing:3px;text-align:center;line-height:2.4;max-width:460px;padding:0 28px;opacity:0;transition:opacity 1s;}
.blackout-hint{font-size:10px;color:#333;position:absolute;bottom:24px;}

/* ===== タイトル ===== */
#screen-title{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(160deg,#0d1b3e 0%,#1a0a2e 50%,#0a1a2e 100%);
  position:relative;overflow:hidden;
}
#screen-title::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 30%,rgba(100,150,255,0.15) 0%,transparent 60%);}
.title-hospital{font-size:12px;letter-spacing:4px;color:#8aafd4;margin-bottom:8px;}
.title-main{font-size:30px;font-weight:700;color:#fff;text-shadow:0 0 30px rgba(150,200,255,0.5);margin-bottom:6px;text-align:center;}
.title-sub{font-size:13px;color:#a0c0e8;margin-bottom:38px;letter-spacing:2px;}
.title-char{width:230px;border-radius:12px;box-shadow:0 8px 40px rgba(100,150,255,0.3);margin-bottom:34px;}
.btn-start{background:linear-gradient(135deg,#1e4a8a,#2d6bc4);border:1px solid rgba(150,200,255,0.4);color:#fff;padding:13px 44px;font-size:16px;border-radius:30px;cursor:pointer;letter-spacing:3px;transition:all 0.3s;box-shadow:0 4px 20px rgba(50,100,200,0.4);position:relative;z-index:1;}
.btn-start:hover{background:linear-gradient(135deg,#2d6bc4,#3d8be0);transform:translateY(-2px);}

/* ===== 名前入力 ===== */
#screen-name{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#0d1b3e,#1a0a2e);padding:40px;}
.name-box{background:rgba(255,255,255,0.05);border:1px solid rgba(150,200,255,0.3);border-radius:16px;padding:38px;text-align:center;max-width:400px;width:100%;}
.name-title{font-size:17px;color:#a0c0e8;margin-bottom:7px;}
.name-desc{font-size:12px;color:#607080;margin-bottom:22px;}
.name-input{width:100%;padding:11px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(150,200,255,0.4);border-radius:8px;color:#fff;font-size:17px;text-align:center;outline:none;letter-spacing:2px;}
.name-input:focus{border-color:rgba(150,200,255,0.8);}
.btn-name{margin-top:18px;background:linear-gradient(135deg,#1e4a8a,#2d6bc4);border:1px solid rgba(150,200,255,0.4);color:#fff;padding:11px 34px;font-size:14px;border-radius:24px;cursor:pointer;letter-spacing:2px;transition:all 0.3s;}
.btn-name:hover{transform:translateY(-1px);}

/* ===== ゲーム画面 ===== */
#screen-game{display:none;flex-direction:column;min-height:100vh;background:#0f0f1e;}
.game-header{background:rgba(10,20,50,0.95);border-bottom:1px solid rgba(100,150,255,0.2);padding:9px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.header-title{font-size:11px;color:#607080;letter-spacing:2px;}
.header-stats{display:flex;gap:14px;}
.stat-day{font-size:13px;color:#8aafd4;}
.stat-score{font-size:13px;color:#60d080;}
.progress-bar{height:3px;background:rgba(255,255,255,0.1);}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d6bc4,#60a0ff);transition:width 0.5s;}
.game-body{display:flex;flex:1;}

.char-panel{width:290px;min-width:250px;background:rgba(5,10,25,0.8);border-right:1px solid rgba(100,150,255,0.15);display:flex;flex-direction:column;align-items:center;padding:14px;gap:10px;}
.char-img{width:100%;max-width:250px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:opacity 0.3s;}
.char-name{font-size:13px;color:#8aafd4;letter-spacing:1px;}
.affinity-wrap{width:100%;}
.affinity-label{font-size:10px;color:#607080;margin-bottom:3px;}
.affinity-bar{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.affinity-fill{height:100%;background:linear-gradient(90deg,#e060a0,#ff90c0);border-radius:3px;transition:width 0.6s;}

/* セリフボックス */
.speech-area{
  width:100%;background:rgba(15,25,55,0.92);
  border:1px solid rgba(100,150,255,0.25);border-radius:10px;
  padding:11px 13px;min-height:88px;position:relative;
}
.speech-speaker{font-size:10px;color:#607080;margin-bottom:4px;}
.speech-text{font-size:13px;line-height:1.75;color:#c8d8f0;transition:opacity 0.2s;}
/* クリック送りボタン */
.speech-btn{
  margin-top:8px;width:100%;background:rgba(40,80,160,0.3);
  border:1px solid rgba(100,150,255,0.3);border-radius:6px;
  color:#8aafd4;font-size:11px;padding:6px;cursor:pointer;
  transition:all 0.2s;letter-spacing:1px;
  display:none;
}
.speech-btn:hover{background:rgba(60,110,200,0.4);}

.quiz-panel{flex:1;padding:18px 22px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.day-badge{font-size:11px;color:#8aafd4;background:rgba(100,150,255,0.1);border:1px solid rgba(100,150,255,0.2);border-radius:20px;padding:3px 12px;display:inline-block;align-self:flex-start;}
.category-badge{font-size:11px;color:#a0c080;background:rgba(100,180,80,0.1);border:1px solid rgba(100,180,80,0.2);border-radius:20px;padding:3px 12px;display:inline-block;}
.question-text{font-size:15px;line-height:1.8;color:#e0e8ff;background:rgba(255,255,255,0.03);border-left:3px solid rgba(100,150,255,0.5);padding:13px 17px;border-radius:0 8px 8px 0;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(100,150,255,0.2);color:#c0d0f0;padding:11px 15px;font-size:14px;text-align:left;border-radius:10px;cursor:pointer;transition:all 0.2s;line-height:1.5;}
.choice-btn:hover:not(:disabled){background:rgba(100,150,255,0.1);border-color:rgba(100,150,255,0.5);transform:translateX(3px);}
.choice-btn.correct{background:rgba(60,160,80,0.2);border-color:#60c080;color:#a0f0b0;}
.choice-btn.wrong{background:rgba(180,50,50,0.2);border-color:#c06060;color:#f0a0a0;}
.choice-btn:disabled{cursor:default;}
.explanation-box{display:none;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px;font-size:12px;line-height:1.7;}
.exp-label{font-size:10px;color:#8aafd4;margin-bottom:4px;letter-spacing:1px;}
.exp-text{color:#a0b0c8;}
.exp-ref{font-size:10px;color:#607080;margin-top:5px;font-style:italic;}

/* ===== エンディング ===== */
#screen-ending{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px;background:linear-gradient(160deg,#0d1b3e,#1a0a2e);}
.ending-label{font-size:11px;letter-spacing:4px;color:#8aafd4;margin-bottom:8px;}
.ending-title{font-size:25px;font-weight:700;color:#fff;margin-bottom:18px;text-align:center;}
.ending-imgs{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:18px;max-width:720px;}
.ending-img{border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-height:290px;}
.ending-score{font-size:14px;color:#a0c0e8;margin-bottom:5px;}
.ending-result{font-size:12px;color:#607080;margin-bottom:22px;text-align:center;}
.btn-retry{background:linear-gradient(135deg,#1e4a8a,#2d6bc4);border:1px solid rgba(150,200,255,0.4);color:#fff;padding:11px 34px;font-size:14px;border-radius:24px;cursor:pointer;letter-spacing:2px;transition:all 0.3s;}
.btn-retry:hover{transform:translateY(-2px);}

@media(max-width:660px){
  .game-body{flex-direction:column;}
  .char-panel{width:100%;min-width:0;flex-direction:row;align-items:flex-start;flex-wrap:wrap;padding:9px;gap:8px;}
  .char-img{max-width:110px;}
  .quiz-panel{padding:12px;}
}
</style>
</head>

  </div>
  <div class="vn-textbox">
    <div class="vn-speaker" id="vn-speaker"></div>
    <div class="vn-text" id="vn-text"></div>
    <div class="vn-hint">クリックで進む</div>
  </div>
</div>

const QUIZ_DATA = [{"id": 1, "category": "敗血症・ショック", "question": "敗血症性ショックの診断基準（Sepsis-3）において、適切な輸液負荷にもかかわらず平均動脈圧（MAP）を維持するために必要な昇圧薬の閾値と、血清乳酸値の組み合わせとして正しいのはどれか。", "choices": ["MAP ≥65 mmHg維持に昇圧薬が必要 かつ 乳酸値 >2 mmol/L", "MAP ≥60 mmHg維持に昇圧薬が必要 かつ 乳酸値 >2 mmol/L", "MAP ≥65 mmHg維持に昇圧薬が必要 かつ 乳酸値 >4 mmol/L", "MAP ≥70 mmHg維持に昇圧薬が必要 かつ 乳酸値 >2 mmol/L"], "answer": 0, "explanation": "Sepsis-3定義では、適切な輸液後もMAP≥65 mmHg維持に昇圧薬を要し、かつ乳酸値>2 mmol/Lが敗血症性ショックの基準。", "reference": "Singer M, et al. The Third International Consensus Definitions for Sepsis and Septic Shock (Sepsis-3). JAMA. 2016;315(8):801-810."}, {"id": 2, "category": "敗血症・ショック", "question": "敗血症性低灌流またはショック患者への初期輸液として、Surviving Sepsis Campaign Guidelines 2026が推奨するのはどれか。", "choices": ["少なくとも30 mL/kgの静脈内晶質液を最初の3時間以内に投与する（条件付き推奨）", "乳酸リンゲル液などのbalanced crystalloid 20 mL/kg を1時間以内に投与する（強い推奨）", "生理食塩水 30 mL/kgを3時間以内に投与する（強い推奨）", "コロイド液（アルブミン）30 mL/kgを優先的に投与する（条件付き推奨）"], "answer": 0, "explanation": "SSCG2026では「少なくとも30 mL/kgのIV晶質液を最初の3時間以内に」を条件付き推奨として継続。ただし患者個別の特性と状況を考慮して初期輸液量を選択することが重要とされ、乳酸値上昇のみを輸液の根拠にしないよう注意が追加された。20 mL/kg未満では死亡率増加の可能性が示唆されている。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}, {"id": 3, "category": "敗血症・ショック", "question": "敗血症性ショックへの昇圧薬投与について、Surviving Sepsis Campaign Guidelines 2026の推奨として正しいのはどれか。", "choices": ["ノルエピネフリンが第一選択であり、中心静脈路確保まで開始を待機すべきである", "ノルエピネフリンが第一選択であり、低血圧が持続する場合は中心静脈路確保を待たず末梢ラインから開始することを推奨する", "バソプレシンを第一選択とし、ノルエピネフリンを追加する", "エピネフリンが第一選択であり、MAP ≥70 mmHgを目標とする"], "answer": 1, "explanation": "SSCG2026ではノルエピネフリンが依然として第一選択。新たにMAP回復を目的として中心静脈路確保を待つより末梢ライン（末梢静脈路）から昇圧薬を開始することを条件付き推奨として追加。不安定なショックでは輸液と昇圧薬の同時投与も許容されている。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}, {"id": 4, "category": "敗血症・ショック", "question": "Surviving Sepsis Campaign Guidelines 2026における抗菌薬投与タイミングの推奨として正しいのはどれか。", "choices": ["ショックの有無にかかわらず、全例で診断後1時間以内の投与を強く推奨する", "敗血症性ショックまたは確定的敗血症では認識後1時間以内（強い推奨）。ショックのない可能性例では3時間以内に迅速評価のうえ投与を検討（条件付き推奨）", "ICU入室後30分以内に投与することが最優先とされる", "血液培養の結果を確認してから投与を開始する"], "answer": 1, "explanation": "SSCG2026では敗血症性ショックまたは確定的敗血症では認識後すぐ、理想的には1時間以内に抗菌薬投与（強い推奨）。一方、ショックのない「可能性例」では迅速に感染・非感染を評価し、感染が疑われ続ける場合は3時間以内の投与を条件付き推奨とした。感染可能性が低く非ショックであれば一時保留も許容。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}, {"id": 5, "category": "敗血症・ショック", "question": "Surviving Sepsis Campaign Guidelines 2026において、敗血症性ショックへのグルココルチコイド投与の推奨はどれか。", "choices": ["ショック診断後すぐに全例投与を開始する（強い推奨）", "昇圧薬に反応しないショックが持続する場合にヒドロコルチゾン静注を推奨（条件付き推奨）。ACTHテストは不要", "ACTHテストで副腎機能低下が確認された場合のみ投与する（強い推奨）", "デキサメタゾンが第一選択とされる（強い推奨）"], "answer": 1, "explanation": "SSCG2026では十分な輸液・昇圧薬に反応しない敗血症性ショック持続例にヒドロコルチゾン静注（200 mg/日）を条件付き推奨として継続。ACTHテストによる選別は不要。2026版ではコルチコステロイドの位置付けは2021版から実質的に変更なし。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}, {"id": 6, "category": "敗血症・ショック", "question": "閉塞性ショック（緊張性気胸）に対する最初の処置として正しいのはどれか。", "choices": ["気管挿管後にCT撮影", "胸腔ドレナージ（第5肋間中腋窩線）", "緊急開胸術", "用手的減圧（第2肋間鎖骨中線への太針穿刺）"], "answer": 3, "explanation": "緊張性気胸によるショックには即座の減圧が必要。太針（14G）を第2肋間鎖骨中線または第4・5肋間前腋窩線に挿入し、その後チューブ胸腔ドレナージを行う。", "reference": "JATEC第6版. 日本外傷学会・日本救急医学会監修. 2021."}, {"id": 7, "category": "敗血症・ショック", "question": "心原性ショックに対するIABP（大動脈内バルーンパンピング）に関して、現在のエビデンスとして最も正しいのはどれか。", "choices": ["AMIによる心原性ショックで30日死亡率を有意に改善する", "AMIによる心原性ショックで死亡率改善は示されておらず、ルーチン使用は推奨されない", "大動脈弁逆流合併例に特に有効である", "Impellaより心拍出量改善効果が優れている"], "answer": 1, "explanation": "IABP-SHOCK II試験（2012）でIABPはAMI起因心原性ショックの30日死亡率を改善せず。現ガイドラインではルーチン使用は推奨されない。大動脈弁逆流は禁忌。", "reference": "Thiele H, et al. Intraaortic balloon support for myocardial infarction with cardiogenic shock. N Engl J Med. 2012;367:1287-1296."}, {"id": 8, "category": "敗血症・ショック", "question": "分布性ショックの原因として正しくないのはどれか。", "choices": ["アナフィラキシー", "神経原性ショック（脊髄損傷）", "大量肺塞栓症", "劇症型溶連菌感染症"], "answer": 2, "explanation": "大量肺塞栓症は右室後負荷増大による閉塞性ショック。アナフィラキシー・神経原性・敗血症（劇症型溶連菌含む）は分布性ショックに分類される。", "reference": "日本救急医学会. ICLSコースガイドブック改訂第4版. 2018."}, {"id": 9, "category": "心肺蘇生・ACLS", "question": "AHA 2020ガイドラインにおける成人院外心停止（VF/pVT）への除細動エネルギーとして正しいのはどれか（二相性除細動器）。", "choices": ["100〜200 J（メーカー推奨値）", "200 J固定", "360 J固定", "50〜100 J"], "answer": 0, "explanation": "AHA2020では二相性除細動器はメーカー推奨値（通常120〜200 J）での除細動を推奨。不明の場合は最大値を使用。単相性は360 J固定。", "reference": "Panchal AR, et al. 2019 AHA Focused Update on Advanced Cardiovascular Life Support. Circulation. 2019;140:e881-e894; AHA Guidelines 2020."}, {"id": 10, "category": "心肺蘇生・ACLS", "question": "院内心停止においてAHA 2020が推奨するCPR中の胸骨圧迫の深さと速さはどれか。", "choices": ["深さ4〜5 cm、100〜120回/分", "深さ5〜6 cm、100〜120回/分", "深さ5〜6 cm、80〜100回/分", "深さ4〜5 cm、120〜140回/分"], "answer": 1, "explanation": "AHA2020では胸骨圧迫の深さ5〜6 cm（2〜2.4インチ）、速さ100〜120回/分を推奨。深すぎると骨折・臓器損傷リスクが上昇。", "reference": "Panchal AR, et al. Part 3: Adult Basic and Advanced Life Support: 2020 AHA Guidelines for CPR and ECC. Circulation. 2020;142(16_suppl_2):S366-S468."}, {"id": 11, "category": "心肺蘇生・ACLS", "question": "電気的活動はあるが脈拍のない状態（PEA）の可逆的原因として「4H4T」に含まれないのはどれか。", "choices": ["低体温（Hypothermia）", "高血糖（Hyperglycemia）", "心タンポナーデ（Tamponade）", "張力性気胸（Tension pneumothorax）"], "answer": 1, "explanation": "4H4TはHypovolemia, Hypoxia, Hydrogen ion（アシドーシス）, Hypo/Hyperkalemia, Hypothermia, Tension pneumothorax, Tamponade, Toxins, Thrombosis（肺・冠動脈）。高血糖は含まない。", "reference": "AHA Guidelines for CPR and ECC 2020. Circulation. 2020;142(16_suppl_2)."}, {"id": 12, "category": "心肺蘇生・ACLS", "question": "ROSC（自己心拍再開）後の目標体温管理（TTM）に関する2021年TTM2試験の結論として正しいのはどれか。", "choices": ["33℃管理は36℃管理より神経学的転帰を有意に改善する", "33℃管理と37.5℃以下の発熱回避は180日死亡率・神経学的転帰に差がなかった", "32℃管理が最も有効で標準治療とされた", "体温管理は神経学的転帰に影響しないため不要である"], "answer": 1, "explanation": "TTM2試験（2021, NEJM）では院外VF停止後のROSC患者において33℃管理と発熱回避（≤37.8℃）で180日死亡率・神経学的転帰に有意差なし。発熱回避は依然推奨される。", "reference": "Dankiewicz J, et al. Hypothermia versus Normothermia after Out-of-Hospital Cardiac Arrest. N Engl J Med. 2021;384:2283-2294."}, {"id": 13, "category": "心肺蘇生・ACLS", "question": "アデノシンが無効な安定した幅広QRS頻拍（単形性）に対して推奨される薬剤はどれか。", "choices": ["アトロピン", "リドカイン", "プロカインアミド（ニフェカラント）", "ジゴキシン"], "answer": 2, "explanation": "安定した単形性幅広QRS頻拍でアデノシン無効時、プロカインアミドまたはニフェカラント（日本）が推奨。リドカインは代替薬。アトロピンは徐脈に使用。", "reference": "AHA ACLS Guidelines 2020; 日本循環器学会 不整脈非薬物治療ガイドライン2018."}, {"id": 14, "category": "心肺蘇生・ACLS", "question": "小児心停止において成人と異なりアドレナリン投与前に除細動を優先すべき初期リズムはどれか。", "choices": ["心静止（Asystole）", "無脈性電気活動（PEA）", "心室細動（VF）", "洞性徐脈"], "answer": 2, "explanation": "小児・成人ともにshockable rhythm（VF/無脈性VT）は除細動が最優先。小児心停止は窒息性が多くAsystole/PEAが多いが、VF/VTが確認された場合は即座に除細動。", "reference": "AHA Pediatric Advanced Life Support 2020. Circulation. 2020;142(16_suppl_2):S469-S523."}, {"id": 15, "category": "心肺蘇生・ACLS", "question": "ECPR（体外循環補助CPR）の適応として現在最もエビデンスがある状況はどれか。", "choices": ["全ての院外心停止症例", "蘇生抵抗性の院外VF停止（選択された若年・witnessed arrest・短い無灌流時間）", "非shockable rhythmによる院内心停止", "院外心停止の全例でBystander CPRが行われた場合"], "answer": 1, "explanation": "ECPR（VA-ECMO補助CPR）は蘇生抵抗性VFで短い無灌流時間・目撃あり・若年の選択症例でROSCが期待できる。ARREST試験・PRAGUE-OHCA試験で有効性が示唆されている。", "reference": "Yannopoulos D, et al. Advanced reperfusion strategies for patients with out-of-hospital cardiac arrest and refractory ventricular fibrillation (ARREST). Lancet. 2020;396(10265):1807-1816."}, {"id": 16, "category": "外傷管理", "question": "JATECにおける外傷初期診療のプライマリーサーベイの順序として正しいのはどれか。", "choices": ["A（気道）→B（呼吸）→C（循環）→D（意識）→E（体温・脱衣）", "C（循環）→A（気道）→B（呼吸）→D（意識）→E（体温）", "A→C→B→D→E", "D（意識）→A（気道）→B（呼吸）→C（循環）→E（体温）"], "answer": 0, "explanation": "JATECのプライマリーサーベイはABCDE（Airway→Breathing→Circulation→Disability→Exposure/Environment）の順。生命を脅かす問題を順に評価・処置する。", "reference": "JATEC第6版. 日本外傷学会・日本救急医学会監修. 2021."}, {"id": 17, "category": "外傷管理", "question": "外傷性出血に対するDamage Control Resuscitation（DCR）において推奨される輸血比率（赤血球：FFP：血小板）はどれか。", "choices": ["1：1：1", "2：1：1", "3：2：1", "1：2：1"], "answer": 0, "explanation": "DCRでは赤血球：FFP：血小板=1：1：1の大量輸血プロトコール（MTP）が推奨される。PROPPR試験（JAMA 2015）で1：1：1が2：1：1より24時間・30日死亡率で優れることが示された。", "reference": "Holcomb JB, et al. Transfusion of Plasma, Platelets, and Red Blood Cells in a 1:1:1 vs a 1:1:2 Ratio and Mortality in Patients With Severe Trauma (PROPPR). JAMA. 2015;313(5):471-482."}, {"id": 18, "category": "外傷管理", "question": "外傷性出血に対するトラネキサム酸（TXA）投与について、CRASH-2試験の結論として正しいのはどれか。", "choices": ["傷害から3時間以内の投与で全死亡・出血死亡を有意に減少させる", "傷害から6時間以内の投与で有効だが3時間以降は死亡率が増加する", "外傷後すべての患者に投与すべきである", "頭部外傷合併例では禁忌である"], "answer": 1, "explanation": "CRASH-2試験では受傷後3時間以内のTXA投与で死亡率を有意に低下、3〜8時間では効果なし・死亡増加傾向。受傷3時間以内の出血性外傷に推奨される。", "reference": "CRASH-2 trial collaborators. Effects of tranexamic acid on death, vascular occlusive events, and blood transfusion in trauma patients. Lancet. 2010;376(9734):23-32."}, {"id": 19, "category": "外傷管理", "question": "外傷性大動脈損傷（TAI）のゴールドスタンダード診断法と第一選択治療はどれか。", "choices": ["胸部X線→外科的開胸修復", "造影CT→TEVAR（胸部大動脈ステントグラフト内挿術）", "経食道心エコー→外科的修復", "血管造影→外科的修復"], "answer": 1, "explanation": "TAIの診断は造影CTが第一選択。治療はTEVAR（胸部EVAR）が開胸手術より低侵襲で術後死亡率・対麻痺リスクが低く第一選択となっている。", "reference": "Lee WA, et al. Endovascular repair of traumatic thoracic aortic injury. J Vasc Surg. 2011;53(4):1-10; AAST guidelines."}, {"id": 20, "category": "外傷管理", "question": "骨盤骨折に伴う後腹膜血腫に対してショック状態が持続する場合の処置として最も適切なのはどれか。", "choices": ["緊急開腹してパッキング", "骨盤固定帯装着後に血管造影・動脈塞栓術（TAE）または骨盤骨折固定", "大量輸血のみで保存的に管理", "腹腔鏡下止血術"], "answer": 1, "explanation": "骨盤骨折による出血性ショックは骨盤固定帯（シーツラッピング等）で骨盤容積を減少させ、TAEまたは創外固定が有効。動脈性出血にはTAEが奏効する。", "reference": "JATEC第6版; Cullinane DC, et al. Eastern Association for the Surgery of Trauma practice guidelines. J Trauma Acute Care Surg. 2011."}, {"id": 21, "category": "外傷管理", "question": "開放性頭蓋骨骨折を伴う外傷性脳損傷（TBI）において、予防的抗菌薬投与について現在のエビデンスはどれか。", "choices": ["感染予防のためルーチンに推奨される", "髄膜炎予防に有効であり強く推奨される", "感染率・死亡率改善を示すエビデンスがなく、ルーチン投与は推奨されない", "アンピシリンのみ有効とされている"], "answer": 2, "explanation": "開放性頭蓋底骨折や穿通性TBIへの予防的抗菌薬投与は感染率低下を示すエビデンスが乏しく、ルーチン使用は推奨されない（BTF Guideline 2016）。", "reference": "Carney N, et al. Guidelines for the Management of Severe Traumatic Brain Injury, 4th Edition. Neurosurgery. 2017;80(1):6-15."}, {"id": 22, "category": "外傷管理", "question": "外傷後のPermissive Hypotension（許容的低血圧）戦略において、頭部外傷合併例での目標収縮期血圧はどれか。", "choices": ["収縮期血圧 70〜90 mmHg", "収縮期血圧 ≥90 mmHg（MAP ≥80 mmHg）", "収縮期血圧 80〜100 mmHg", "MAPを50 mmHg以上に維持"], "answer": 1, "explanation": "頭部外傷合併例では脳灌流圧維持が重要。収縮期血圧≥90 mmHg（またはMAP≥80 mmHg）を維持する必要があり、通常外傷での許容的低血圧（収縮期70〜90）は適用できない。", "reference": "Carney N, et al. Guidelines for the Management of Severe Traumatic Brain Injury, 4th Edition. Neurosurgery. 2017;80(1):6-15."}, {"id": 23, "category": "呼吸管理・人工呼吸器", "question": "ARDSに対する肺保護換気戦略（ARMA試験に基づく）で正しいのはどれか。", "choices": ["一回換気量 10〜12 mL/kg（理想体重）、プラトー圧 ≤40 cmH₂O", "一回換気量 6 mL/kg（理想体重）、プラトー圧 ≤30 cmH₂O", "一回換気量 8 mL/kg（理想体重）、PEEP ≤5 cmH₂O", "一回換気量 6 mL/kg（理想体重）、プラトー圧 ≤40 cmH₂O"], "answer": 1, "explanation": "ARMA試験（NEJM 2000）では一回換気量6 mL/kg（理想体重）・プラトー圧≤30 cmH₂Oの肺保護換気で従来換気（12 mL/kg）より28日死亡率が有意に低下（31% vs 40%）。", "reference": "Acute Respiratory Distress Syndrome Network. Ventilation with lower tidal volumes as compared with traditional tidal volumes for acute lung injury. N Engl J Med. 2000;342(18):1301-1308."}, {"id": 24, "category": "呼吸管理・人工呼吸器", "question": "中等症〜重症ARDSに対する腹臥位療法（prone positioning）について、PROSEVA試験の結論はどれか。", "choices": ["28日死亡率を有意に改善しなかった", "腹臥位16時間/日以上で28日死亡率を有意に改善した（16% vs 33%）", "酸素化改善効果はあるが死亡率には影響しない", "肺保護換気との併用では効果がない"], "answer": 1, "explanation": "PROSEVA試験（NEJM 2013）では重症ARDS（P/F比<150）に対し16時間/日以上の腹臥位で28日死亡率が有意改善（16% vs 33%）。現在の標準治療の一つ。", "reference": "Guérin C, et al. Prone positioning in severe acute respiratory distress syndrome. N Engl J Med. 2013;368(23):2159-2168."}, {"id": 25, "category": "呼吸管理・人工呼吸器", "question": "人工呼吸器関連肺炎（VAP）予防バンドルに含まれないのはどれか。", "choices": ["頭部挙上（30〜45度）", "毎日の鎮静中断と抜管可否評価", "ルーチンの気管支鏡検査", "口腔ケア（クロルヘキシジン）"], "answer": 2, "explanation": "VAPバンドルは頭部挙上・毎日の覚醒試験と自発呼吸試験・口腔ケア・深部静脈血栓予防・消化性潰瘍予防など。ルーチン気管支鏡はバンドルに含まれない。", "reference": "IHI VAP Bundle; Klompas M, et al. Strategies to prevent ventilator-associated pneumonia in acute care hospitals. Infect Control Hosp Epidemiol. 2022;43(6):687-713."}, {"id": 26, "category": "呼吸管理・人工呼吸器", "question": "ネーザルハイフロー（HFNC）の重症ARDS（P/F比<200）への使用について、FLORALI試験での結論はどれか。", "choices": ["挿管率・ICU死亡率ともにNIVより有意に低下した", "90日死亡率はHFNCが標準酸素・NIVより有意に低く、P/F<200では挿管率も低下", "挿管率はNIVと同等で死亡率改善なし", "HFNCは軽症のみ有効で重症には適応がない"], "answer": 1, "explanation": "FLORALI試験（NEJM 2015）では低酸素血症性呼吸不全（P/F<200）にHFNCが90日死亡率でNIV・標準酸素より低く、挿管率も低下。P/F<200サブグループで特に有効。", "reference": "Frat JP, et al. High-flow oxygen through nasal cannula in acute hypoxemic respiratory failure. N Engl J Med. 2015;372(23):2185-2196."}, {"id": 27, "category": "呼吸管理・人工呼吸器", "question": "人工呼吸器離脱（ウィーニング）において自発呼吸試験（SBT）の成功基準として正しいのはどれか。", "choices": ["呼吸数 ≤25回/分、SpO₂ ≥90%、浅速呼吸指数（RSBI）≤105", "呼吸数 ≤20回/分、SpO₂ ≥95%、RSBI ≤80", "呼吸数 ≤30回/分、SpO₂ ≥88%、RSBI ≤120", "呼吸数 ≤25回/分、SpO₂ ≥90%、RSBI ≤80"], "answer": 0, "explanation": "SBT成功基準：呼吸数≤25/分、SpO₂≥90%（またはPaO₂≥60 mmHg）、RSBI（呼吸数/一回換気量）≤105。RSBIは最も予測力が高い指標の一つ。", "reference": "Boles JM, et al. Weaning from mechanical ventilation. Eur Respir J. 2007;29(5):1033-1056."}, {"id": 28, "category": "呼吸管理・人工呼吸器", "question": "重症ARDSに対する筋弛緩薬（シスアトラクリウム）の早期投与について、ACURASYS試験とRE-ACURASYS試験の結論を統合すると正しいのはどれか。", "choices": ["48時間投与で90日死亡率を有意に改善する", "RE-ACURASYS試験でACURASYS試験の生存率改善を再現できず、ルーチン投与は推奨されない", "酸素化改善効果のみ認められ死亡率は改善しない", "中等症ARDSにのみ有効で重症には適応がない"], "answer": 1, "explanation": "ACURASYS（2010）では死亡率改善が示されたが、ROSE試験（RE-ACURASYS相当、2019 NEJM）では再現されず。現在は軽鎮静下の早期ルーチン筋弛緩は推奨されない。", "reference": "National Heart, Lung, and Blood Institute PETAL Clinical Trials Network (ROSE trial). N Engl J Med. 2019;380(21):1997-2008."}, {"id": 29, "category": "神経救急", "question": "急性虚血性脳卒中に対するrt-PA静注血栓溶解療法の投与時間窓（最終正常確認時刻からの時間）はどれか。", "choices": ["1.5時間以内", "3時間以内（選択例では4.5時間以内まで拡大可）", "6時間以内", "8時間以内"], "answer": 1, "explanation": "rt-PA（アルテプラーゼ）は最終正常確認から3時間以内（0.6 mg/kg、日本）、ECASS-3試験に基づき4.5時間以内への拡大も一部適応。日本では2019年から4.5時間以内が適応拡大された。", "reference": "日本脳卒中学会 脳卒中治療ガイドライン2021; Hacke W, et al. ECASS-3. N Engl J Med. 2008;359(13):1317-1329."}, {"id": 30, "category": "神経救急", "question": "くも膜下出血（SAH）における再出血予防として最も重要な早期処置はどれか。", "choices": ["降圧療法のみで72時間保存的に管理", "ニモジピンの早期投与", "コイル塞栓術または外科的クリッピングによる動脈瘤閉鎖（72時間以内）", "腰椎穿刺による持続的髄液ドレナージ"], "answer": 2, "explanation": "SAH後の最大の再出血リスクは最初の24時間（15〜20%）。ISAT試験でコイル塞栓術が外科的クリッピングより転帰良好。早期（72時間以内）の動脈瘤処置が推奨される。", "reference": "Molyneux A, et al. International Subarachnoid Aneurysm Trial (ISAT). Lancet. 2002;360(9342):1267-1274; 日本脳卒中学会 脳卒中治療ガイドライン2021."}, {"id": 31, "category": "神経救急", "question": "非痙攣性てんかん重積状態（NCSE）の診断に最も有用な検査はどれか。", "choices": ["頭部MRI拡散強調画像", "脳脊髄液検査", "持続脳波モニタリング（cEEG）", "頭部CT造影"], "answer": 2, "explanation": "NCSEは意識障害を示すが痙攣を伴わないため臨床診断が困難。持続脳波モニタリング（cEEG）が診断のゴールドスタンダード。ICU患者の意識障害ではNCSEを念頭にcEEGを考慮する。", "reference": "Hirsch LJ, et al. American Clinical Neurophysiology Society's Standardized Critical Care EEG Terminology. J Clin Neurophysiol. 2021;38(1):1-29."}, {"id": 32, "category": "神経救急", "question": "重症頭部外傷（GCS≤8）における頭蓋内圧（ICP）管理の目標値として現在推奨されているのはどれか。", "choices": ["ICP <10 mmHg", "ICP <20 mmHg、CPP 60〜70 mmHg", "ICP <25 mmHg、CPP ≥50 mmHg", "ICP <30 mmHg、CPP ≥80 mmHg"], "answer": 1, "explanation": "BTF第4版（2016）では重症TBIにおけるICP目標は<22 mmHg（旧<20）、脳灌流圧（CPP）60〜70 mmHgを推奨。CPPの過度な上昇はARDS等のリスク。", "reference": "Carney N, et al. Guidelines for the Management of Severe Traumatic Brain Injury, 4th Edition. Neurosurgery. 2017;80(1):6-15."}, {"id": 33, "category": "神経救急", "question": "急性期脳梗塞に対する血管内治療（機械的血栓回収術）の適応として正しいのはどれか（2020年以降のガイドライン）。", "choices": ["発症6時間以内、前方循環の大血管閉塞のみ適応", "発症24時間以内で、MRI/CTパーフュージョンによる梗塞中核・ペナンブラ評価で適応が拡大された", "発症4.5時間以内のみ適応", "rt-PA静注が無効だった症例のみ適応"], "answer": 1, "explanation": "DAWN（2018）・DEFUSE3（2018）試験でパーフュージョン画像評価により発症6〜24時間後でも機械的血栓回収術の有効性が示された。現在は24時間以内まで適応拡大。", "reference": "Nogueira RG, et al. Thrombectomy 6 to 24 Hours after Stroke with a Mismatch between Deficit and Infarct (DAWN). N Engl J Med. 2018;378(1):11-21."}, {"id": 34, "category": "神経救急", "question": "高血圧性脳症と可逆性後頭葉白質脳症（PRES）の特徴的なMRI所見はどれか。", "choices": ["T2/FLAIR高信号が前頭葉・側頭葉優位", "T2/FLAIR高信号が後頭葉・頭頂葉優位（血管原性浮腫）", "DWI高信号・ADC低下（細胞毒性浮腫）が後頭葉に見られる", "造影効果を伴う環状病変"], "answer": 1, "explanation": "PRESは後頭葉・頭頂葉優位のT2/FLAIR高信号（血管原性浮腫）が特徴。DWIでは拡散制限なし（ADC高値）が典型的で可逆性。DWI高信号は梗塞への進展を示す。", "reference": "Hinchey J, et al. A reversible posterior leukoencephalopathy syndrome. N Engl J Med. 1996;334(8):494-500."}, {"id": 35, "category": "中毒・集中治療", "question": "アセトアミノフェン中毒に対するN-アセチルシステイン（NAC）投与について正しいのはどれか。", "choices": ["服用後24時間以降は効果がない", "服用後8〜10時間以内の投与で肝毒性をほぼ完全に予防できる", "Rumack-Matthewノモグラムで治療域でも全例投与が必要", "血液透析を先に行い、その後NACを投与する"], "answer": 1, "explanation": "アセトアミノフェン中毒ではNAC投与が肝毒性予防の主体。服用後8〜10時間以内に開始すれば肝毒性をほぼ完全に予防。24時間以降も進行性肝障害には投与継続を考慮する。", "reference": "Rumack BH, et al. Acetaminophen overdose. Arch Intern Med. 1981;141(3):380-385; 日本中毒学会中毒治療ガイドライン."}, {"id": 36, "category": "中毒・集中治療", "question": "有機リン系農薬中毒において過剰なコリン作動性症状（SLUDGE症状）の治療として第一選択はどれか。", "choices": ["プラリドキシム（PAM）のみを大量投与", "アトロピンを症状消失まで大量投与し、PAMを早期に併用", "ベンゾジアゼピン系薬のみで痙攣管理", "活性炭投与後に血液透析を実施"], "answer": 1, "explanation": "有機リン中毒ではムスカリン受容体遮断のためアトロピン大量投与（気道分泌・気管支痙攣消失まで）が必須。PAMはアセチルコリンエステラーゼ再活性化のため早期（中毒後24〜48時間以内）併用が重要。", "reference": "Eddleston M, et al. Management of acute organophosphorus pesticide poisoning. Lancet. 2008;371(9612):597-607."}, {"id": 37, "category": "中毒・集中治療", "question": "一酸化炭素（CO）中毒において高圧酸素療法（HBO）の絶対適応に含まれないのはどれか。", "choices": ["意識消失の既往がある", "神経学的障害（見当識障害、失調など）がある", "CO-Hb値 >25%（無症状）", "妊婦"], "answer": 2, "explanation": "HBO絶対適応は意識消失、神経学的症状、心筋障害、妊婦、CO-Hb>25%の有症状例。無症状でCO-Hb>25%のみでは相対的適応。施設やガイドラインにより若干異なるが、神経症状の有無が最重要。", "reference": "Weaver LK, et al. Hyperbaric oxygen for acute carbon monoxide poisoning. N Engl J Med. 2002;347(14):1057-1067."}, {"id": 38, "category": "中毒・集中治療", "question": "ICUでの血糖管理において、NICE-SUGAR試験の結論として正しいのはどれか。", "choices": ["厳格血糖管理（81〜108 mg/dL）は通常管理より90日死亡率を有意に低下させた", "厳格血糖管理は通常管理（≤180 mg/dL）より90日死亡率が有意に高かった", "厳格血糖管理はICU入室期間を有意に短縮した", "血糖値と予後は相関しないことが示された"], "answer": 1, "explanation": "NICE-SUGAR試験（NEJM 2009）では厳格血糖管理（81〜108）群で90日死亡率が通常管理（≤180）より有意に高く、低血糖も多かった。現在の推奨目標は140〜180 mg/dL。", "reference": "NICE-SUGAR Study Investigators. Intensive versus Conventional Glucose Control in Critically Ill Patients. N Engl J Med. 2009;360(13):1283-1297."}, {"id": 39, "category": "中毒・集中治療", "question": "ICU患者の早期経腸栄養（EN）開始について現在のガイドライン（SCCM/ASPEN 2016）が推奨するタイミングはどれか。", "choices": ["ICU入室後7日以内", "ICU入室後24〜48時間以内", "血行動態安定後72時間以内", "人工呼吸器装着後5日以内"], "answer": 1, "explanation": "SCCM/ASPEN 2016では血行動態が安定した重症患者へのEN開始はICU入室後24〜48時間以内を推奨。腸管粘膜保護・感染合併症減少・死亡率低下に有効。", "reference": "McClave SA, et al. Guidelines for the Provision and Assessment of Nutrition Support Therapy in the Adult Critically Ill Patient: SCCM and ASPEN. JPEN J Parenter Enteral Nutr. 2016;40(2):159-211."}, {"id": 40, "category": "中毒・集中治療", "question": "クロストリジウム・ディフィシル感染症（CDI）の重症例に対する第一選択治療薬はどれか（IDSA/SHEA 2021ガイドライン）。", "choices": ["メトロニダゾール経口", "バンコマイシン経口", "フィダキソマイシン経口", "テイコプラニン経口"], "answer": 2, "explanation": "IDSA/SHEA 2021ガイドラインでは初発CDI（非重症・重症とも）の第一選択はフィダキソマイシン経口（再発率がバンコマイシンより低い）。バンコマイシンは代替薬。メトロニダゾールは初発軽症のみ代替。", "reference": "Kelly CR, et al. ACG Clinical Guidelines: Prevention, Diagnosis, and Treatment of Clostridioides difficile Infections. Am J Gastroenterol. 2021;116(6):1124-1147."}, {"id": 41, "category": "中毒・集中治療", "question": "重症患者における深部静脈血栓症（DVT）予防で、薬物療法を施行できない場合の代替として推奨されるのはどれか。", "choices": ["弾性ストッキングのみ", "間欠的空気圧迫装置（IPC）", "低用量ワルファリン経口", "ヘパリンフラッシュ"], "answer": 1, "explanation": "出血リスク等で薬物療法（低分子ヘパリン等）が使用できない場合、間欠的空気圧迫装置（IPC）がDVT予防の代替として推奨される。弾性ストッキング単独の証拠は弱い。", "reference": "Kahn SR, et al. Prevention of VTE in nonsurgical patients. Chest. 2012;141(2 Suppl):e195S-e226S."}, {"id": 42, "category": "中毒・集中治療", "question": "急性腎障害（AKI）の診断基準（KDIGO 2012）においてステージ3に相当するのはどれか。", "choices": ["SCr基準値から1.5〜1.9倍上昇または0.3 mg/dL以上上昇", "SCr基準値から2.0〜2.9倍上昇", "SCr基準値から3.0倍以上上昇、または4.0 mg/dL以上、または腎代替療法の開始", "尿量 <0.5 mL/kg/h が6〜12時間持続"], "answer": 2, "explanation": "KDIGO 2012 AKIステージ3：SCr基準値から3.0倍以上、またはSCr≥4.0 mg/dL（急性増悪）、または腎代替療法（RRT）開始、または18歳未満でeGFR<35 mL/min/1.73m²。", "reference": "KDIGO AKI Work Group. KDIGO Clinical Practice Guideline for Acute Kidney Injury. Kidney Int Suppl. 2012;2(1):1-138."}, {"id": 43, "category": "中毒・集中治療", "question": "薬物過量摂取患者への活性炭投与が禁忌となる状況として適切なのはどれか。", "choices": ["服薬後2時間以内", "鉄剤・リチウム・アルコール中毒", "意識清明でGCS 15点", "服薬後1時間以内の農薬中毒"], "answer": 1, "explanation": "活性炭は鉄剤・リチウム・アルコール・重金属には無効（吸着しない）で禁忌または無意義。腸閉塞・穿孔・気道未保護（誤嚥リスク）も禁忌。", "reference": "Position Statement: Single-Dose Activated Charcoal. Clinical Toxicology. 2005;43(2):61-87."}, {"id": 44, "category": "敗血症・ショック", "question": "敗血症関連DIC（播種性血管内凝固症候群）の治療において、現在最もエビデンスに基づいた対応はどれか。", "choices": ["ヘパリンの積極的投与", "敗血症の根本原因治療（感染源コントロール・抗菌薬）が最優先", "トロンボモジュリンの全例投与", "フレッシュフローズンプラズマ（FFP）の定期的投与"], "answer": 1, "explanation": "DICの治療は基礎疾患の治療が最重要。敗血症DICでは感染源コントロールと適切な抗菌薬が根本的治療。トロンボモジュリンは出血型DICに一定の有効性があるが全例投与のエビデンスは不十分。", "reference": "日本血栓止血学会. DIC診断基準の改訂について. 2017; Levi M, et al. Guidelines for the diagnosis and management of DIC. Br J Haematol. 2009."}, {"id": 45, "category": "集中治療", "question": "PAD（Pain, Agitation, Delirium）バンドルにおいて、ICUデリリウムのスクリーニングツールとして推奨されているのはどれか。", "choices": ["GCS（Glasgow Coma Scale）", "MMSE（Mini-Mental State Examination）", "CAM-ICU または ICDSC", "RASS単独"], "answer": 2, "explanation": "SCCM PADISガイドライン2018では、CAM-ICU（Confusion Assessment Method for ICU）またはICSDS（Intensive Care Delirium Screening Checklist）によるルーチンのデリリウムスクリーニングを推奨。RASSは鎮静深度の評価ツール。", "reference": "Devlin JW, et al. Clinical Practice Guidelines for the Prevention and Management of Pain, Agitation/Sedation, Delirium, Immobility, and Sleep Disruption in Adult Patients in the ICU. Crit Care Med. 2018;46(9):e825-e873."}, {"id": 46, "category": "敗血症・ショック", "question": "Surviving Sepsis Campaign Guidelines 2026で新たに追加された、65歳以上の敗血症性ショック患者に対するMAP目標の推奨はどれか。", "choices": ["65歳以上でも全例MAP ≥65 mmHgを厳格に維持する（強い推奨）", "65歳以上ではMAP 60〜65 mmHgを目標範囲とすることを提案する（条件付き推奨）", "65歳以上ではMAP ≥75 mmHgを目標とする（強い推奨）", "65歳以上では昇圧薬使用を避け、輸液のみで管理する（条件付き推奨）"], "answer": 1, "explanation": "SSCG2026の新推奨として、65歳以上の敗血症性ショック患者にはMAP 60〜65 mmHgを目標範囲とする条件付き推奨が追加。OVATION-65試験等のエビデンスに基づき、高齢者には低めのMAP目標が適切とされる。一般成人へのMAP≥65 mmHg目標（強い推奨）は2026版でも継続。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}, {"id": 47, "category": "敗血症・ショック", "question": "Surviving Sepsis Campaign Guidelines 2026において、敗血症・敗血症性ショック患者への解熱薬投与に関する新推奨として正しいのはどれか。", "choices": ["感染制御のため発熱に対して積極的に解熱薬を投与することを強く推奨する", "臨床転帰改善を目的としたルーチンの解熱薬投与に反対する（条件付き推奨）。症状緩和目的の使用は許容される", "体温38.5℃以上で全例アセトアミノフェン静注を推奨する（強い推奨）", "解熱薬は死亡率を有意に低下させるため必須投与とする（強い推奨）"], "answer": 1, "explanation": "SSCG2026の新推奨として、臨床転帰改善を目的としたルーチン解熱薬投与に反対する条件付き推奨が追加された。発熱は免疫応答の一部であり転帰改善のためのルーチン使用は推奨されない。ただし患者の不快感・苦痛緩和を目的とした使用は許容されるとされている。", "reference": "Prescott HC, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2026. Crit Care Med. 2026. doi:10.1097/CCM.0000000000007075."}];

// ===== 状態 =====
let playerName = "先生";
let questions = [];
let currentQ = 0;
let correctCount = 0;
let totalAnswered = 0;
let awaitingAnswer = false; // 選択肢待ち中フラグ

// ===== VNシーン =====
let vnLines = [], vnIdx = 0, vnOnEnd = null;

function showVN(lines, onEnd) {
  vnLines = lines; vnIdx = 0; vnOnEnd = onEnd;
  document.getElementById('vn-screen').style.display = 'flex';
  renderVN();
}
function renderVN() {
  if (vnIdx >= vnLines.length) {
    document.getElementById('vn-screen').style.display = 'none';
    if (vnOnEnd) vnOnEnd();
    return;
  }
  const L = vnLines[vnIdx];
  const charEl = document.getElementById('vn-char');
  if (L.img !== undefined) {
    if (L.img === null) { charEl.style.opacity = '0'; }
    else { charEl.style.opacity='0'; setTimeout(()=>{ charEl.src=IMGS[L.img]; charEl.style.opacity='1'; },180); }
  }
  document.getElementById('vn-overlay').style.background = L.dim ? `rgba(0,0,0,${L.dim})` : 'rgba(0,0,0,0)';
  document.getElementById('vn-speaker').textContent = L.speaker || '';
  document.getElementById('vn-text').textContent = L.text || '';
}
function vnNext() { vnIdx++; renderVN(); }

// ===== 暗転 =====
let blLines = [], blIdx = 0, blOnEnd = null;

function showBlackout(lines, onEnd) {
  blLines = lines; blIdx = 0; blOnEnd = onEnd;
  document.getElementById('blackout-screen').style.display = 'flex';
  document.getElementById('hb-text').style.opacity = '0';
  document.getElementById('blackout-text').style.opacity = '0';
  renderBL();
}
function renderBL() {
  if (blIdx >= blLines.length) {
    document.getElementById('blackout-screen').style.display = 'none';
    if (blOnEnd) blOnEnd();
    return;
  }
  const L = blLines[blIdx];
  const hb = document.getElementById('hb-text');
  const bt = document.getElementById('blackout-text');
  hb.style.opacity = '0'; bt.style.opacity = '0';
  setTimeout(() => {
    hb.textContent = L.heart || '';
    hb.style.opacity = L.heart ? '1' : '0';
    bt.textContent = L.text || '';
    bt.style.opacity = '1';
  }, 300);
}
function blackoutNext() { blIdx++; renderBL(); }

// ===== セリフキュー（ゲーム内） =====
let spQueue = [], spIdx = 0, spOnEnd = null;

function setSpeech(lines, onEnd) {
  spQueue = lines; spIdx = 0; spOnEnd = onEnd;
  renderSpeech();
}
function renderSpeech() {
  const btn = document.getElementById('speech-btn');
  const txt = document.getElementById('speech-text');
  if (spIdx >= spQueue.length) {
    btn.style.display = 'none';
    txt.textContent = '';
    if (spOnEnd) { const cb = spOnEnd; spOnEnd = null; cb(); }
    return;
  }
  const item = spQueue[spIdx];
  const text = typeof item === 'string' ? item : item.text;
  const imgKey = (typeof item === 'object' && item.img) ? item.img : null;

  txt.style.opacity = '0';
  setTimeout(() => { txt.textContent = text; txt.style.opacity = '1'; }, 130);
  if (imgKey) setCharImg(imgKey);

  // 最後の行かどうかでボタン表示変更
  if (spIdx < spQueue.length - 1) {
    btn.textContent = '▼ 次へ';
    btn.style.display = 'block';
  } else {
    // 最後の行はonEndがある場合のみボタン表示
    if (spOnEnd) {
      btn.textContent = '▶ 続ける';
      btn.style.display = 'block';
    } else {
      btn.style.display = 'none';
    }
  }
}
function advanceSpeech() {
  if (spIdx < spQueue.length - 1) {
    spIdx++;
    renderSpeech();
  } else {
    // 最後の行でクリック → onEnd発火
    spIdx++;
    renderSpeech();
  }
}

function setCharImg(name) {
  const el = document.getElementById('char-img');
  el.style.opacity = '0';
  setTimeout(() => { el.src = IMGS[name]; el.style.opacity = '1'; }, 150);
}
function getAff() {
  return totalAnswered === 0 ? 0 : Math.round(correctCount / totalAnswered * 100);
}

// ===== 画面遷移 =====
function showName() {
  document.getElementById('screen-title').style.display = 'none';
  document.getElementById('screen-name').style.display = 'flex';
}
function startOpening() {
  const v = document.getElementById('player-name-input').value.trim();
  playerName = v || '先生';
  document.getElementById('screen-name').style.display = 'none';
  playOpening();
}

// ===== オープニング =====
function playOpening() {
  showVN([
    {img:null, speaker:'', text:'4月1日。岩手県高度救命救急センター。'},
    {img:null, speaker:'', text:`${playerName}は今日、この病院に研修医として赴任した。`},
    {img:'無表情', speaker:'ナレーション', text:'廊下を歩いていると、ナースステーション前で一人の医師と目が合った。'},
    {img:'無表情', speaker:'まりりん先生', text:'……あなたが今日から来る研修医？'},
    {img:'無表情', speaker:playerName, text:'は、はい。よろしくお願いします！'},
    {img:'無表情', speaker:'まりりん先生', text:'ふん。私の名前はまりりん。一応、あなたの指導医よ。'},
    {img:'無表情', speaker:'まりりん先生', text:'邪魔しないでくれれば、それでいいわ。……期待はしてないから。'},
    {img:'無表情', speaker:playerName+'（心の声）', text:'（不愛想な先生だ。でも……なんだろう、この人、すごく——）'},
    {img:'喜んでる', speaker:playerName+'（心の声）', text:'（……綺麗だ。）'},
    {img:'無表情', speaker:'まりりん先生', text:'何ぼーっとしてるの。さっさと着替えてきなさい。'},
    {img:'無表情', speaker:playerName+'（心の声）', text:`（この30日間で、絶対に振り向かせてみせる——！）`},
    {img:'無表情', speaker:'ナレーション', text:'こうして、まりりん先生との30日間が始まった。'},
  ], () => startGame());
}

// ===== ゲーム開始 =====
function startGame() {
  const shuffled = [...QUIZ_DATA].sort(() => Math.random()-0.5);
  questions = shuffled.slice(0, 30);
  currentQ = 0; correctCount = 0; totalAnswered = 0;
  document.getElementById('screen-game').style.display = 'flex';
  showQuestion();
}

// ===== 問題表示 =====
function showQuestion() {
  const q = questions[currentQ];
  const day = currentQ + 1;
  const aff = getAff();

  document.getElementById('day-label').textContent = `Day ${day} / 30`;
  document.getElementById('score-label').textContent = `正答: ${correctCount}問`;
  document.getElementById('progress-fill').style.width = `${(day-1)/30*100}%`;
  document.getElementById('day-badge').textContent = `Day ${day}`;
  document.getElementById('category-badge').textContent = q.category;
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('affinity-fill').style.width = `${aff}%`;
  document.getElementById('explanation-box').style.display = 'none';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${String.fromCharCode(65+i)}. ${c}`;
    btn.onclick = () => answerQuestion(i);
    choicesEl.appendChild(btn);
  });

  awaitingAnswer = true;

  // 問題提示セリフ（onEnd=null → ボタン非表示、回答待ち）
  const intros = [
    [{text:`では${playerName}、今日の問題よ。`, img:'無表情'}],
    [{text:`${playerName}、これはわかる？`, img:'無表情'}],
    [{text:`今日はこれを聞くわ。しっかり考えなさい。`, img:'無表情'}],
    [{text:`……${playerName}、この問題はどう？`, img:'無表情'}],
    [{text:`次の問題よ。`, img:'無表情'}],
  ];
  setSpeech(intros[Math.floor(Math.random()*intros.length)], null);
}

// ===== 回答 =====
function answerQuestion(chosen) {
  if (!awaitingAnswer) return;
  awaitingAnswer = false;

  const q = questions[currentQ];
  const isCorrect = chosen === q.answer;
  totalAnswered++;
  if (isCorrect) correctCount++;

  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
  });

  document.getElementById('exp-text').textContent = q.explanation;
  document.getElementById('exp-ref').textContent = `引用: ${q.reference}`;
  document.getElementById('explanation-box').style.display = 'block';

  const aff = getAff();
  document.getElementById('affinity-fill').style.width = `${aff}%`;
  document.getElementById('score-label').textContent = `正答: ${correctCount}問`;

  const lines = isCorrect ? getCorrectLines(aff) : getWrongLines(aff);

  // セリフ終了後に次の処理へ
  setSpeech(lines, () => {
    currentQ++;
    if (currentQ === 15) {
      // 15日目終了→ブレイクシーン
      document.getElementById('screen-game').style.display = 'none';
      playBreakScene();
    } else if (currentQ >= 30) {
      document.getElementById('screen-game').style.display = 'none';
      playConfession();
    } else {
      showQuestion();
    }
  });
}

// ===== 正解セリフ =====
function getCorrectLines(aff) {
  if (aff >= 80) return [
    {text:'……正解よ。', img:'喜んでる'},
    {text:'ふふ、最近あなたのこと、見直してるわ。', img:'喜んでる'},
    {text:'……なんか、一緒にいると安心するのよね。変でしょ。', img:'喜んでる'},
  ];
  if (aff >= 60) return [
    {text:'正解。まあ、悪くないわね。', img:'喜んでる'},
    {text:'……少しは見どころがあるじゃない。', img:'喜んでる'},
  ];
  if (aff >= 40) return [
    {text:'ふん、正解。当然でしょ。', img:'喜んでる'},
    {text:'別に褒めてないから、勘違いしないで。', img:'無表情'},
  ];
  return [
    {text:'ふん。偶然正解したんじゃないでしょうね。', img:'無表情'},
    {text:'……まあ、合ってるわ。', img:'無表情'},
  ];
}

// ===== 不正解セリフ =====
function getWrongLines(aff) {
  if (aff >= 60) return [
    {text:'……惜しかったわ。', img:'悲しい'},
    {text:'でも、あなたなら次は大丈夫よ、きっと。', img:'困ってる'},
  ];
  if (aff >= 40) return [
    {text:'違うわ。', img:'困ってる'},
    {text:'……ちゃんと解説を読んで、理解しなさい。', img:'困ってる'},
  ];
  return [
    {text:'ハズレ。全然ダメじゃない。', img:'怒ってる'},
    {text:'これくらい知ってて当然でしょ。しっかりしなさい。', img:'怒ってる'},

}

function showEndingScreen(label, title, imgNames, result, rate) {
  document.getElementById('ending-label').textContent = label;
  document.getElementById('ending-title').textContent = title;
  document.getElementById('ending-score').textContent = `30問中 ${correctCount}問正解（正答率 ${rate}%）`;
  document.getElementById('ending-result').textContent = result;
  const el = document.getElementById('ending-imgs');
  el.innerHTML = '';
  imgNames.forEach(n => {
    const i = document.createElement('img');
    i.src = IMGS[n]; i.className = 'ending-img'; el.appendChild(i);
  });
  document.getElementById('screen-ending').style.display = 'flex';
}

function retryGame() {
  correctCount=0; totalAnswered=0; currentQ=0;
  document.getElementById('screen-ending').style.display='none';
  document.getElementById('screen-title').style.display='flex';
}
