<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にじくらげのさかなとり！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; user-select:none; touch-action:none; }
body {
  font-family: 'Mochiy Pop One', sans-serif;
  background: #081420;
  display: flex; align-items: center; justify-content: center;
  min-height: 100svh; overflow: hidden;
}
#wrap {
  position: relative;
  width: min(420px, 100vw);
  height: min(680px, 100svh);
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 0 60px #1a6a9a55;
}
canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
#hud {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: linear-gradient(180deg, rgba(5,15,35,0.88) 65%, transparent);
  pointer-events: none; z-index: 10;
}
.hud-box {
  background: rgba(255,255,255,0.13);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 14px; padding: 5px 14px;
  font-size: 1rem; color: #fff;
  text-shadow: 0 1px 6px #0009;
}
#timerBar {
  position: absolute; top: 52px; left: 12px; right: 12px;
  height: 10px; background: rgba(255,255,255,0.12);
  border-radius: 8px; overflow: hidden; z-index: 10;
}
#timerFill {
  height: 100%; width: 100%; border-radius: 8px;
  background: linear-gradient(90deg, #ff4444, #ffaa00, #ffff00, #44ee44, #44aaff);
  transition: width .12s linear;
}
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: rgba(5,18,45,0.90);
  backdrop-filter: blur(6px);
  border-radius: 20px; z-index: 50;
}
.screen.hidden { display: none; }
.card {
  background: rgba(12,35,75,0.96);
  border: 1.5px solid rgba(120,200,255,0.3);
  border-radius: 24px;
  padding: 28px 32px; text-align: center;
  max-width: 300px; width: 88%;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.card-title { font-size: 1.45rem; color: #88eeff; text-shadow: 0 0 14px #44ccff55; margin-bottom: 6px; }
.card-sub { font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; color:#88aacc; line-height:1.75; margin-bottom:18px; }
.card-score { font-size: 2.8rem; color: #ffdd44; margin: 8px 0 4px; }
.card-msg   { font-family:'Zen Maru Gothic',sans-serif; color:#aaccee; font-size:.88rem; margin-bottom:14px; }
.btn {
  display:block; width:100%; padding:13px 0; border:none;
  border-radius:16px; font-family:'Mochiy Pop One',sans-serif;
  font-size:1rem; cursor:pointer; letter-spacing:1px;
  transition: transform .12s;
}
.btn:hover { transform: scale(1.04); }
.btn-start { background: linear-gradient(135deg,#1a99ee,#0d66bb); color:#fff; }
.btn-retry { background: linear-gradient(135deg,#ff8800,#dd5500); color:#fff; margin-bottom:6px; }
.btn-home  { background: rgba(255,255,255,0.1); color:#88aacc; border:1px solid rgba(255,255,255,0.2); }
.medals { display:flex; gap:10px; justify-content:center; margin-bottom:14px; }
.medal { font-size:1.8rem; opacity:.2; transition:opacity .3s; }
.medal.on { opacity:1; animation:mPop .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes mPop { from{transform:scale(0)} to{transform:scale(1)} }
#hint {
  position:absolute; bottom:10px; left:0; right:0; text-align:center;
  font-family:'Zen Maru Gothic',sans-serif; font-size:.72rem;
  color:rgba(255,255,255,0.3); pointer-events:none; z-index:10;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bgC"></canvas>
  <canvas id="gC"></canvas>
  <div id="hud">
    <div class="hud-box" id="hudScore">🐟 0</div>
    <div class="hud-box" id="hudCombo" style="color:#ffdd44">🔥 x0</div>
    <div class="hud-box" id="hudTime">⏱ 30</div>
  </div>
  <div id="timerBar"><div id="timerFill"></div></div>
  <div id="hint">← → キー / 画面タップで動く</div>

  <!-- START -->
  <div class="screen" id="startScreen">
    <div class="card">
      <div style="font-size:62px;animation:bob 1.3s ease-in-out infinite">🌈</div>
      <div class="card-title">にじくらげの<br>さかなとり！</div>
      <p class="card-sub">およいでいるさかなを<br>タッチしてつかまえよう！<br>30びょうでなんびきとれるかな🐠</p>
      <button class="btn btn-start" id="btnStart">▶ はじめる！</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen hidden" id="resultScreen">
    <div class="card">
      <div style="font-size:52px" id="resEmoji">🎉</div>
      <div class="card-title">タイムアップ！</div>
      <div class="card-score" id="resScore">0 てん</div>
      <div class="card-msg"  id="resMsg">もう一回！</div>
      <div class="medals">
        <span class="medal" id="m1">🥉</span>
        <span class="medal" id="m2">🥈</span>
        <span class="medal" id="m3">🥇</span>
        <span class="medal" id="m4">🏆</span>
      </div>
      <button class="btn btn-retry" id="btnRetry">🔄 もういちど！</button>
      <button class="btn btn-home"  id="btnHome">🏠 タイトルへ</button>
    </div>
  </div>
</div>

<style>
@keyframes bob {
  0%,100%{transform:translateY(0) rotate(-5deg);}
  50%{transform:translateY(-10px) rotate(5deg);}
}
</style>

<script>
(function(){

var wrap=document.getElementById('wrap');
var bgC=document.getElementById('bgC');
var gC=document.getElementById('gC');
var bgX=bgC.getContext('2d');
var ctx=gC.getContext('2d');
var W,H;

function resize(){
  var r=wrap.getBoundingClientRect();
  W=bgC.width=gC.width=r.width;
  H=bgC.height=gC.height=r.height;
}
resize();
window.addEventListener('resize',function(){resize();drawBG();});

// ---- SEEDED RNG ----
var seed=54321;
function rng(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/4294967295;}

// ============================================================
//  BACKGROUND  (aquarium crayon drawing recreation)
// ============================================================
function drawBG(){
  bgX.clearRect(0,0,W,H);

  // water gradient
  var wg=bgX.createLinearGradient(0,0,0,H*.82);
  wg.addColorStop(0,'#4477bb');
  wg.addColorStop(.5,'#2255aa');
  wg.addColorStop(1,'#1a4488');
  bgX.fillStyle=wg; bgX.fillRect(0,0,W,H*.82);

  // crayon hatch lines
  bgX.save(); bgX.globalAlpha=0.15;
  for(var y=6;y<H*.82;y+=8){
    bgX.beginPath(); bgX.moveTo(0,y+(rng()-.5)*3);
    for(var x=0;x<W;x+=16) bgX.lineTo(x+(rng()-.5)*2,y+(rng()-.5)*3);
    bgX.strokeStyle=rng()<.5?'#aaccee':'#ffffff';
    bgX.lineWidth=.7+rng()*.7; bgX.lineCap='round'; bgX.stroke();
  }
  bgX.restore();

  // light rays
  bgX.save(); bgX.globalAlpha=0.055;
  for(var lr=0;lr<7;lr++){
    bgX.beginPath();
    bgX.moveTo(W*.15+lr*W*.11,0);
    bgX.lineTo(W*.08+lr*W*.11+W*.06,H*.72);
    bgX.strokeStyle='#ffffff'; bgX.lineWidth=14+rng()*10; bgX.stroke();
  }
  bgX.restore();

  // sand floor
  var sg=bgX.createLinearGradient(0,H*.78,0,H);
  sg.addColorStop(0,'#d4b06a'); sg.addColorStop(1,'#b8924a');
  bgX.fillStyle=sg; bgX.fillRect(0,H*.78,W,H);
  bgX.save(); bgX.globalAlpha=0.22;
  for(var si=0;si<9;si++){
    bgX.beginPath(); bgX.arc(rng()*W,H*.82+rng()*H*.1,3+rng()*8,0,Math.PI*2);
    bgX.strokeStyle='#9a7030'; bgX.lineWidth=1.5; bgX.stroke();
  }
  bgX.restore();

  // seaweeds left
  for(var wn=0;wn<5;wn++){
    var wx=W*.06+wn*W*.045;
    bgX.save(); bgX.globalAlpha=0.88;
    bgX.strokeStyle=wn%2===0?'#2a8a3a':'#3aaa4a';
    bgX.lineWidth=2.5+rng()*1.5; bgX.lineCap='round';
    bgX.beginPath(); bgX.moveTo(wx,H*.82);
    var ht=H*.25+rng()*H*.1;
    for(var wy=0;wy<ht;wy+=10) bgX.lineTo(wx+Math.sin(wy*.16)*(7+rng()*4),H*.82-wy);
    bgX.stroke(); bgX.restore();
  }

  // rock bottom left
  bgX.save(); bgX.globalAlpha=0.88;
  bgX.fillStyle='#282828';
  bgX.beginPath(); bgX.ellipse(W*.1,H*.845,W*.095,H*.065,-.2,0,Math.PI*2);
  bgX.fill(); bgX.strokeStyle='#111'; bgX.lineWidth=2; bgX.stroke();
  bgX.globalAlpha=0.3;
  for(var rl=0;rl<10;rl++){
    bgX.beginPath();
    bgX.moveTo(W*.02+rng()*W*.15,H*.81+rng()*H*.07);
    bgX.lineTo(W*.03+rng()*W*.13,H*.81+rng()*H*.07);
    bgX.strokeStyle='#666'; bgX.lineWidth=1.3; bgX.stroke();
  }
  bgX.restore();

  // starfish
  drawStarfish(W*.2,H*.835,13,'#ee3333',0.85);

  // bug on rock
  drawBug(W*.11,H*.8);

  // blue wavy seaweed right
  for(var bw=0;bw<3;bw++){
    var bwx=W*.77+bw*W*.055;
    bgX.save(); bgX.globalAlpha=0.65;
    bgX.strokeStyle='#3399cc'; bgX.lineWidth=2; bgX.lineCap='round';
    bgX.beginPath(); bgX.moveTo(bwx,H*.82);
    for(var bwy=0;bwy<H*.18;bwy+=9) bgX.lineTo(bwx+Math.sin(bwy*.25+bw)*(9+rng()*3),H*.82-bwy);
    bgX.stroke(); bgX.restore();
  }

  // snail shapes on sand
  var snailXs=[W*.28,W*.38,W*.5,W*.61,W*.73,W*.87];
  for(var sn=0;sn<snailXs.length;sn++) drawSnail(snailXs[sn],H*.835);

  // red/pink coral squiggles
  var coralColors=['#ee4455','#ff6677','#ee3366'];
  for(var co=0;co<3;co++){
    var csx=W*.32+co*W*.08;
    bgX.save(); bgX.globalAlpha=0.6;
    bgX.strokeStyle=coralColors[co%3]; bgX.lineWidth=2; bgX.lineCap='round';
    bgX.beginPath(); bgX.moveTo(csx,H*.82);
    for(var cy2=0;cy2<H*.1;cy2+=7) bgX.lineTo(csx+Math.sin(cy2*.35+co*1.2)*(8+co*3),H*.82-cy2);
    bgX.stroke(); bgX.restore();
  }

  // yellow zigzag seaweed
  bgX.save(); bgX.globalAlpha=0.65; bgX.strokeStyle='#ddbb00'; bgX.lineWidth=2; bgX.lineCap='round';
  bgX.beginPath(); bgX.moveTo(W*.52,H*.82);
  for(var yy=0;yy<H*.15;yy+=8){
    bgX.lineTo(W*.52+(yy%16<8?8:-8),H*.82-yy);
  }
  bgX.stroke(); bgX.restore();

  // right side ladder bars
  bgX.save(); bgX.globalAlpha=0.45; bgX.strokeStyle='#3366aa'; bgX.lineWidth=1.5;
  var cx=W*.89;
  bgX.beginPath(); bgX.moveTo(cx,H*.08); bgX.lineTo(cx,H*.75); bgX.stroke();
  bgX.beginPath(); bgX.moveTo(cx+W*.04,H*.08); bgX.lineTo(cx+W*.04,H*.75); bgX.stroke();
  for(var rg=0;rg<8;rg++){
    bgX.beginPath(); bgX.moveTo(cx,H*.12+rg*H*.08); bgX.lineTo(cx+W*.04,H*.12+rg*H*.08); bgX.stroke();
  }
  bgX.restore();

  // net top right
  bgX.save(); bgX.globalAlpha=0.45; bgX.strokeStyle='#cc3344'; bgX.lineWidth=1.5;
  for(var nl=0;nl<4;nl++){
    bgX.beginPath(); bgX.moveTo(W*.74+nl*W*.03,H*.03); bgX.lineTo(W*.74+nl*W*.03+W*.04,H*.14); bgX.stroke();
  }
  for(var nh=0;nh<3;nh++){
    bgX.beginPath(); bgX.moveTo(W*.74,H*.04+nh*H*.04); bgX.lineTo(W*.86,H*.04+nh*H*.04); bgX.stroke();
  }
  bgX.restore();
}

function drawStarfish(x,y,r,col,alpha){
  bgX.save(); bgX.globalAlpha=alpha||0.9; bgX.fillStyle=col; bgX.strokeStyle='#aa1111'; bgX.lineWidth=1.5;
  bgX.beginPath();
  for(var i=0;i<10;i++){
    var a=i*Math.PI/5-Math.PI/2, rad=i%2===0?r:r*.42;
    var px=x+Math.cos(a)*rad, py=y+Math.sin(a)*rad;
    i===0?bgX.moveTo(px,py):bgX.lineTo(px,py);
  }
  bgX.closePath(); bgX.fill(); bgX.stroke(); bgX.restore();
}
function drawSnail(x,y){
  bgX.save(); bgX.translate(x,y); bgX.strokeStyle='#222'; bgX.lineWidth=2; bgX.lineCap='round';
  bgX.beginPath(); bgX.moveTo(0,0); bgX.lineTo(0,-10); bgX.stroke();
  bgX.beginPath(); bgX.arc(0,-14,4,Math.PI*.5,Math.PI*2.5); bgX.stroke();
  bgX.restore();
}
function drawBug(x,y){
  bgX.save(); bgX.translate(x,y); bgX.fillStyle='#111'; bgX.strokeStyle='#333'; bgX.lineWidth=1.2;
  bgX.beginPath(); bgX.ellipse(0,0,8,6,0,0,Math.PI*2); bgX.fill(); bgX.stroke();
  for(var bl=0;bl<3;bl++){
    var lx=bl*4-4;
    bgX.beginPath(); bgX.moveTo(lx,-3); bgX.lineTo(lx-8,-10); bgX.strokeStyle='#333'; bgX.lineWidth=1.5; bgX.stroke();
    bgX.beginPath(); bgX.moveTo(lx,3);  bgX.lineTo(lx+8,10); bgX.stroke();
  }
  bgX.restore();
}

drawBG();

// ============================================================
//  RAINBOW JELLYFISH DRAW
// ============================================================
var RAINBOW=['#ff2222','#ff8800','#ffee00','#44dd22','#2299ff','#aa44ff'];

function drawJelly(x,y,sc,frame,inv){
  ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc);
  if(inv>0 && Math.floor(inv/4)%2===1) ctx.globalAlpha=0.3;

  var bob=Math.sin(frame*.09)*.03;
  ctx.scale(1+bob,1-bob);

  // tentacles — 5 colored wavy lines
  var tentCols=['#ff2222','#ff8800','#ffee00','#44dd22','#2299ff'];
  var tentOffsets=[-16,-8,0,8,16];
  for(var ti=0;ti<5;ti++){
    ctx.beginPath();
    ctx.moveTo(tentOffsets[ti],16);
    for(var ts=0;ts<44;ts+=5){
      ctx.lineTo(tentOffsets[ti]+Math.sin(frame*.07+ti*.9+ts*.18)*(5+ti*.8), 16+ts);
    }
    ctx.strokeStyle=tentCols[ti]; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.stroke();
  }

  // rainbow bell (half dome)
  // clip to half-circle shape
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,28,Math.PI,0);
  ctx.lineTo(28,14); ctx.quadraticCurveTo(0,22,-28,14); ctx.closePath();
  ctx.clip();

  // rainbow stripes
  var stripeW=56/6;
  for(var ri=0;ri<6;ri++){
    ctx.fillStyle=RAINBOW[ri];
    ctx.fillRect(-28+ri*stripeW,-28,stripeW+1,56);
  }
  ctx.restore();

  // bell outline
  ctx.beginPath();
  ctx.arc(0,0,28,Math.PI,0);
  ctx.lineTo(28,14); ctx.quadraticCurveTo(0,22,-28,14); ctx.closePath();
  ctx.strokeStyle='#222'; ctx.lineWidth=2.8; ctx.stroke();

  // eyes
  ctx.beginPath(); ctx.arc(-9,-4,4.5,0,Math.PI*2); ctx.fillStyle='#1a0a0a'; ctx.fill();
  ctx.beginPath(); ctx.arc(9,-4,4.5,0,Math.PI*2);  ctx.fillStyle='#1a0a0a'; ctx.fill();
  ctx.beginPath(); ctx.arc(-7,-6,1.8,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(11,-6,1.8,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  ctx.restore();
}

// ============================================================
//  FISH TYPES
// ============================================================
var FISH_TYPES=[
  {col:'#ee5500',pts:10,sz:1.0},
  {col:'#ddcc00',pts:10,sz:1.0},
  {col:'#44cc22',pts:10,sz:1.0},
  {col:'#dd2222',pts:15,sz:0.85},
  {col:'#44aaee',pts:15,sz:0.85},
  {col:'#aa44dd',pts:20,sz:0.75},
  {col:'#ff88aa',pts:20,sz:0.75},
];

function drawFish(f){
  ctx.save(); ctx.translate(f.x,f.y);
  if(f.vx<0) ctx.scale(-1,1);
  ctx.scale(f.sc,f.sc);

  // flash on catch
  if(f.caught && Math.floor(f.catchAnim/3)%2===0){ctx.globalAlpha=0.5;}

  // body
  ctx.beginPath(); ctx.ellipse(0,0,16,9,0,0,Math.PI*2);
  ctx.fillStyle=f.col; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.2; ctx.stroke();

  // tail
  ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(-25,-8); ctx.lineTo(-25,8); ctx.closePath();
  ctx.fillStyle=f.col; ctx.fill();

  // fin on top
  ctx.beginPath(); ctx.moveTo(-4,-9); ctx.quadraticCurveTo(4,-18,10,-9);
  ctx.fillStyle=f.col; ctx.fill();

  // eye
  ctx.beginPath(); ctx.arc(9,0,3,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(10,-1,1.2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  ctx.restore();
}

// ============================================================
//  SCORE POPUPS & PARTICLES
// ============================================================
var popups=[];
var parts=[];

function spawnPopup(x,y,pts,combo){
  popups.push({x:x,y:y,vy:-1.8,life:1,pts:pts,combo:combo});
}

function spawnCatchParts(x,y,col){
  for(var i=0;i<10;i++){
    var a=Math.PI*2*i/10;
    parts.push({x:x,y:y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5-1,r:4+Math.random()*4,life:1,col:col});
  }
  // rainbow burst for jelly
  for(var ri2=0;ri2<6;ri2++){
    var a2=Math.PI*2*ri2/6;
    parts.push({x:x,y:y,vx:Math.cos(a2)*5,vy:Math.sin(a2)*5,r:3,life:1,col:RAINBOW[ri2]});
  }
}

// ============================================================
//  GAME STATE
// ============================================================
var state='start';
var jx,jy,jvx=0,jvy=0;
var score,combo,frame,timeLeft;
var fishes;
var spawnTimer;
var invincible=0;
var GAME_TIME=30;

function initGame(){
  jx=W/2; jy=H*.55; jvx=0; jvy=0;
  score=0; combo=0; frame=0; timeLeft=GAME_TIME;
  fishes=[]; popups=[]; parts=[]; invincible=0;
  spawnTimer=0;
  document.getElementById('timerFill').style.width='100%';
  updateHUD();
}

function updateHUD(){
  document.getElementById('hudScore').textContent='🐟 '+score;
  document.getElementById('hudCombo').textContent=combo>=2?'🔥 x'+combo:'';
  document.getElementById('hudTime').textContent='⏱ '+Math.ceil(timeLeft);
}

// ---- INPUT ----
var keys={};
document.addEventListener('keydown',function(e){keys[e.key]=true;});
document.addEventListener('keyup',  function(e){keys[e.key]=false;});
var touchX=null;
gC.addEventListener('pointerdown',function(e){
  var r=gC.getBoundingClientRect();
  touchX=(e.clientX-r.left)*(W/r.width);
});
gC.addEventListener('pointermove',function(e){
  if(e.buttons===0){touchX=null;return;}
  var r=gC.getBoundingClientRect();
  touchX=(e.clientX-r.left)*(W/r.width);
});
gC.addEventListener('pointerup',function(){touchX=null;});

// ---- SPAWN FISH ----
function spawnFish(){
  var type=FISH_TYPES[Math.floor(Math.random()*FISH_TYPES.length)];
  var fromLeft=Math.random()<.5;
  var y=H*.18+Math.random()*(H*.52);
  var spd=1.4+(score/60)*.6+Math.random()*1.2;
  fishes.push({
    x:fromLeft?-30:W+30, y:y,
    vx:fromLeft?spd:-spd,
    vy:(Math.random()-.5)*.4,
    col:type.col, pts:type.pts,
    sc:type.sz, caught:false, catchAnim:0
  });
}

// ---- TIMER ----
var lastTime=Date.now();

// ---- MAIN LOOP ----
function loop(){
  requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0,0,W,H);

  var now=Date.now();
  var dt=(now-lastTime)/1000;
  lastTime=now;

  if(state==='play'){
    timeLeft=Math.max(0,timeLeft-dt);
    document.getElementById('timerFill').style.width=(timeLeft/GAME_TIME*100)+'%';
    document.getElementById('hudTime').textContent='⏱ '+Math.ceil(timeLeft);
    if(timeLeft<=0){ endGame(); return; }

    // jelly input
    var spd=4.5;
    if(keys['ArrowLeft']||keys['a']) jvx=-spd;
    else if(keys['ArrowRight']||keys['d']) jvx=spd;
    else if(touchX!==null){ jvx=(touchX-jx)>4?spd:(touchX-jx)<-4?-spd:0; }
    else jvx*=0.75;

    if(keys['ArrowUp']||keys['w']) jvy=-spd*.7;
    else if(keys['ArrowDown']||keys['s']) jvy=spd*.7;
    else jvy*=0.75;

    jx=Math.max(30,Math.min(W-30,jx+jvx));
    jy=Math.max(50,Math.min(H*.8,jy+jvy));

    // spawn fish
    spawnTimer-=1;
    var interval=Math.max(30,80-score*.4);
    if(spawnTimer<=0){ spawnFish(); spawnTimer=interval+Math.random()*20-10; }

    // update & draw fish
    for(var fi=fishes.length-1;fi>=0;fi--){
      var f=fishes[fi];
      if(!f.caught){
        f.x+=f.vx; f.y+=f.vy;
        f.vy+=(Math.random()-.5)*.04;
        f.vy=Math.max(-.8,Math.min(.8,f.vy));
      } else {
        f.catchAnim++;
        if(f.catchAnim>18){ fishes.splice(fi,1); continue; }
        f.y-=2; f.x+=(Math.random()-.5)*3;
      }
      // out of bounds
      if(!f.caught&&(f.x<-60||f.x>W+60)){ combo=0; fishes.splice(fi,1); continue; }

      // catch collision
      if(!f.caught){
        var dx=jx-f.x, dy=jy-f.y;
        if(Math.sqrt(dx*dx+dy*dy)<28+16*f.sc){
          f.caught=true; f.catchAnim=0;
          combo++;
          var pts=f.pts*(combo>=5?3:combo>=3?2:1);
          score+=pts;
          spawnPopup(f.x,f.y-20,pts,combo);
          spawnCatchParts(f.x,f.y,f.col);
          document.getElementById('hudScore').textContent='🐟 '+score;
          document.getElementById('hudCombo').textContent=combo>=2?'🔥 x'+combo:'';
        }
      }
      drawFish(f);
    }

    // particles
    for(var pi=parts.length-1;pi>=0;pi--){
      var p=parts[pi];
      p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=.05;
      if(p.life<=0){parts.splice(pi,1);continue;}
      ctx.globalAlpha=p.life;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=p.col; ctx.fill();
    }
    ctx.globalAlpha=1;

    // popups
    ctx.textAlign='center';
    for(var pp=popups.length-1;pp>=0;pp--){
      var pop=popups[pp];
      pop.y+=pop.vy; pop.life-=0.03;
      if(pop.life<=0){popups.splice(pp,1);continue;}
      ctx.globalAlpha=pop.life;
      ctx.font='bold '+(pop.combo>=3?'1.5rem':'1.2rem')+' Mochiy Pop One,sans-serif';
      ctx.fillStyle=pop.combo>=5?'#ffdd00':pop.combo>=3?'#ff8800':'#ffffff';
      ctx.shadowColor='#000'; ctx.shadowBlur=6;
      ctx.fillText('+'+(pop.pts)+(pop.combo>=2?' x'+pop.combo:''), pop.x, pop.y);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;

    // draw jelly on top
    drawJelly(jx,jy,1,frame,invincible);
  }
}

function endGame(){
  state='result';
  var s=score;
  document.getElementById('resScore').textContent=s+' てん';
  var msgs=['もう一回チャレンジ！','いい感じ！もっとできる！','すごい！上手だね！','にじくらげチャンピオン！！'];
  var idx=s<30?0:s<80?1:s<160?2:3;
  document.getElementById('resMsg').textContent=msgs[idx];
  document.getElementById('resEmoji').textContent=s<30?'😊':s<80?'🎉':s<160?'🌟':'🏆';
  ['m1','m2','m3','m4'].forEach(function(id){document.getElementById(id).classList.remove('on');});
  [1,30,80,160].forEach(function(t,i){
    if(s>=t) setTimeout(function(){document.getElementById('m'+(i+1)).classList.add('on');},i*220);
  });
  document.getElementById('resultScreen').classList.remove('hidden');
}

document.getElementById('btnStart').addEventListener('click',function(){
  document.getElementById('startScreen').classList.add('hidden');
  initGame(); state='play'; lastTime=Date.now();
});
document.getElementById('btnRetry').addEventListener('click',function(){
  document.getElementById('resultScreen').classList.add('hidden');
  initGame(); state='play'; lastTime=Date.now();
});
document.getElementById('btnHome').addEventListener('click',function(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  state='start';
});

loop();
})();
</script>
